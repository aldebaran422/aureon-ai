  function closeExpandedChart() {
    const modal = document.getElementById('chart-modal');
    if (modal) modal.classList.remove('open');
    document.body.style.overflow = '';
    // Wait for CSS transition to finish before destroying chart instances
    setTimeout(() => {
      if (tvExpandedChart)    { tvExpandedChart.remove();    tvExpandedChart    = null; }
      if (tvExpandedRSIChart) { tvExpandedRSIChart.remove(); tvExpandedRSIChart = null; }
      tvExpandedSeries    = null;
      tvExpandedRSISeries = null;
      tvExpandedEMASeries = null;
      tvExpandedVolSeries = null;
      tvExpandedZoneLines = {};
      tvExpandedSRLines   = {};
      expandedCoin        = null;
      if (modal) modal.innerHTML = '';
    }, 230);
  }

  function initExpandedChart(coinId) {
    const coin    = getCoin(coinId);
    const chartEl = document.getElementById('exp-chart-area');
    const rsiEl   = document.getElementById('exp-rsi-area');
    if (!chartEl) return;

    const chart = LightweightCharts.createChart(chartEl, {
      width:  chartEl.clientWidth,
      height: chartEl.clientHeight,
      layout: { background: { color: '#000' }, textColor: '#555' },
      grid:   { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: 'rgba(255,255,255,0.06)', scaleMargins: { top: 0.06, bottom: 0.26 } },
      timeScale: { borderColor: 'rgba(255,255,255,0.06)', timeVisible: true, secondsVisible: false },
    });

    const series = chart.addCandlestickSeries({
      upColor: '#4ade80', downColor: '#f87171',
      borderUpColor: '#4ade80', borderDownColor: '#f87171',
      wickUpColor: '#4ade80', wickDownColor: '#f87171',
      priceFormat: { type: 'price', precision: coin.priceDecimals, minMove: Math.pow(10, -coin.priceDecimals) },
    });
    const ema20 = chart.addLineSeries({ color: 'rgba(251,191,36,0.85)',  lineWidth: 1, crosshairMarkerVisible: false, lastValueVisible: false, priceLineVisible: false });
    const ema50 = chart.addLineSeries({ color: 'rgba(167,139,250,0.85)', lineWidth: 1, crosshairMarkerVisible: false, lastValueVisible: false, priceLineVisible: false });
    const vol   = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
    chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.76, bottom: 0 }, borderVisible: false });

    tvExpandedChart     = chart;
    tvExpandedSeries    = series;
    tvExpandedEMASeries = { ema20, ema50 };
    tvExpandedVolSeries = vol;

    new ResizeObserver(() => {
      if (tvExpandedChart) tvExpandedChart.resize(chartEl.clientWidth, chartEl.clientHeight);
    }).observe(chartEl);

    // RSI panel
    if (rsiEl) {
      const rsiChart = LightweightCharts.createChart(rsiEl, {
        width: rsiEl.clientWidth, height: rsiEl.clientHeight,
        layout: { background: { color: '#000' }, textColor: '#444' },
        grid:   { vertLines: { color: 'rgba(255,255,255,0.015)' }, horzLines: { color: 'rgba(255,255,255,0.015)' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: 'rgba(255,255,255,0.06)', scaleMargins: { top: 0.1, bottom: 0.1 } },
        timeScale: { borderColor: 'rgba(255,255,255,0.06)', visible: false },
        handleScroll: false, handleScale: false,
      });
      const rsiSeries = rsiChart.addLineSeries({
        color: '#a78bfa', lineWidth: 1,
        priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
        lastValueVisible: true, priceLineVisible: false,
      });
      rsiSeries.createPriceLine({ price: 70, color: 'rgba(248,113,113,0.5)', lineWidth: 1, lineStyle: 2, axisLabelVisible: false });
      rsiSeries.createPriceLine({ price: 30, color: 'rgba(74,222,128,0.5)',  lineWidth: 1, lineStyle: 2, axisLabelVisible: false });
      tvExpandedRSIChart  = rsiChart;
      tvExpandedRSISeries = rsiSeries;

      let syncing = false;
      chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (syncing || !range || !tvExpandedRSIChart) return;
        syncing = true; tvExpandedRSIChart.timeScale().setVisibleLogicalRange(range); syncing = false;
      });
      new ResizeObserver(() => {
        if (tvExpandedRSIChart) tvExpandedRSIChart.resize(rsiEl.clientWidth, rsiEl.clientHeight);
      }).observe(rsiEl);
    }

    // Populate from cache — instant render, no re-fetch
    const candles = tvLastCandles[coinId];
    if (candles && candles.length) {
      applyExpandedData(coinId, candles);
      chart.timeScale().fitContent();
      if (tvExpandedRSIChart) tvExpandedRSIChart.timeScale().fitContent();
    } else {
      const st = document.getElementById('exp-status');
      if (st) st.innerHTML = '<div class="chart-dots"><span></span><span></span><span></span></div>';
      fetchKrakenOHLC(coinId, tvInterval[coinId] || 5);
    }
  }

  function applyExpandedData(coinId, candles) {
    if (tvExpandedSeries) tvExpandedSeries.setData(candles);
    if (tvExpandedEMASeries) {
      tvExpandedEMASeries.ema20.setData(calcEMA(candles, 20));
      tvExpandedEMASeries.ema50.setData(calcEMA(candles, 50));
    }
    if (tvExpandedVolSeries) {
      tvExpandedVolSeries.setData(candles.map(c => ({
        time: c.time, value: c.volume || 0,
        color: c.close >= c.open ? 'rgba(74,222,128,0.3)' : 'rgba(248,113,113,0.3)',
      })));
    }
    if (tvExpandedRSISeries) tvExpandedRSISeries.setData(calcRSI(candles, 14));
    updateExpandedZoneLines();
    drawExpandedSRLines(coinId);
  }

  function updateExpandedZoneLines() {
    if (!tvExpandedSeries) return;
    if (tvExpandedZoneLines.buy)  try { tvExpandedSeries.removePriceLine(tvExpandedZoneLines.buy);  } catch(e) {}
    if (tvExpandedZoneLines.sell) try { tvExpandedSeries.removePriceLine(tvExpandedZoneLines.sell); } catch(e) {}
    tvExpandedZoneLines = {};
    const buyP  = parseFloat(document.getElementById('exp-buy')?.value);
    const sellP = parseFloat(document.getElementById('exp-sell')?.value);
    if (!isNaN(buyP)  && buyP  > 0) tvExpandedZoneLines.buy  = tvExpandedSeries.createPriceLine({ price: buyP,  color: 'rgba(74,222,128,0.7)',  lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Buy'  });
    if (!isNaN(sellP) && sellP > 0) tvExpandedZoneLines.sell = tvExpandedSeries.createPriceLine({ price: sellP, color: 'rgba(248,113,113,0.7)', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Sell' });
  }

  function drawExpandedSRLines(coinId) {
    if (!tvExpandedSeries) return;
    Object.values(tvExpandedSRLines).forEach(pl => { try { tvExpandedSeries.removePriceLine(pl); } catch(e) {} });
    tvExpandedSRLines = {};
    (srLinesData[coinId] || []).forEach(line => {
      const color = line.type === 'support' ? 'rgba(74,222,128,0.75)' : 'rgba(248,113,113,0.75)';
      tvExpandedSRLines[line.id] = tvExpandedSeries.createPriceLine({
        price: line.price, color, lineWidth: 1, lineStyle: 0,
        axisLabelVisible: true, title: line.type === 'support' ? 'S' : 'R',
      });
    });
  }

  function syncExpandedZones(coinId) {
    const buyVal  = document.getElementById('exp-buy')?.value  || '';
    const sellVal = document.getElementById('exp-sell')?.value || '';
    try {
      localStorage.setItem('zone-buy-'  + coinId, buyVal);
      localStorage.setItem('zone-sell-' + coinId, sellVal);
    } catch(e) {}
    const cb = document.getElementById('zone-buy-'  + coinId);
    const cs = document.getElementById('zone-sell-' + coinId);
    if (cb) cb.value = buyVal;
    if (cs) cs.value = sellVal;
    updateZonePriceLines(coinId);
    updateExpandedZoneLines();
  }

  function switchExpandedTimeframe(btn, interval) {
    if (!expandedCoin) return;
    document.querySelectorAll('#chart-modal .tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tvInterval[expandedCoin] = interval;
    // Sync card TF buttons too
    document.querySelectorAll('.tf-btn[data-coin="' + expandedCoin + '"]').forEach(b => {
      b.classList.toggle('active', b.textContent.trim() === tfLabel(interval));
    });
    tvMarkers[expandedCoin] = [];
    fetchKrakenOHLC(expandedCoin, interval);
  }

  function updateExpandedPrice(coinId) {
    if (expandedCoin !== coinId) return;
    const coin  = getCoin(coinId);
    const h     = priceHistory[coinId];
    const price = h.length ? fmtPrice(h[h.length - 1], coin) : '—';
    const pct   = calcPct(h);
    const pe = document.getElementById('exp-price');
    const ce = document.getElementById('exp-chg');
    if (pe) pe.textContent = price;
    if (ce) { ce.textContent = pctLabel(pct); ce.className = 'exp-chg ' + pctClass(pct); }
  }

  function updateExpandedSignal(coinId) {
    if (expandedCoin !== coinId) return;
    const sig = computeSignal(coinId);
    const el  = document.getElementById('exp-signal');
    if (!el) return;
    if (!sig) { el.textContent = '—'; el.className = 'sig-pill neutral'; return; }
    el.textContent = sig.label;
    el.className   = 'sig-pill ' + sig.cls;
  }

  // ── Support / Resistance lines ───────────────────────────────────────────────

  function loadSRLines(coinId) {
    try {
      const raw = localStorage.getItem('sr-lines-' + coinId);
      srLinesData[coinId] = raw ? JSON.parse(raw) : [];
    } catch(e) { srLinesData[coinId] = []; }
  }

  function saveSRLines(coinId) {
    try { localStorage.setItem('sr-lines-' + coinId, JSON.stringify(srLinesData[coinId] || [])); } catch(e) {}
  }

  function renderSRList(coinId) {
    const el = document.getElementById('sr-list-' + coinId);
    if (!el) return;
    const lines = srLinesData[coinId] || [];
    if (!lines.length) {
      el.innerHTML = '<div class="sr-empty">No lines yet — tap + Add to draw one on the chart</div>';
      return;
    }
    const coin = getCoin(coinId);
    el.innerHTML = lines.map(line =>
      '<div class="sr-item">' +
        '<span class="sr-badge ' + line.type + '">' + (line.type === 'support' ? 'Support' : 'Resistance') + '</span>' +
        '<span class="sr-item-price">' + fmtPrice(line.price, coin) + '</span>' +
        '<button class="sr-del-btn" onclick="deleteSRLine(\'' + coinId + '\',\'' + line.id + '\')" title="Remove line">✕</button>' +
      '</div>'
    ).join('');
  }

  function toggleSRForm(coinId) {
    const form  = document.getElementById('sr-form-' + coinId);
    const input = document.getElementById('sr-price-' + coinId);
    if (!form) return;
    const open = form.style.display === 'none' || form.style.display === '';
    form.style.display = open ? 'block' : 'none';
    if (open && input) setTimeout(() => input.focus(), 50);
  }

  function toggleSRType(coinId) {
    const btn = document.getElementById('sr-type-' + coinId);
    if (!btn) return;
    if (btn.classList.contains('support')) {
      btn.classList.replace('support', 'resistance');
      btn.textContent = 'Resistance';
    } else {
      btn.classList.replace('resistance', 'support');
      btn.textContent = 'Support';
    }
  }

  function addSRLine(coinId) {
    const typeBtn  = document.getElementById('sr-type-' + coinId);
    const priceInput = document.getElementById('sr-price-' + coinId);
    if (!typeBtn || !priceInput) return;
    const price = parseFloat(priceInput.value);
    if (isNaN(price) || price <= 0) {
      priceInput.focus(); return;
    }
    const type = typeBtn.classList.contains('support') ? 'support' : 'resistance';
    const id   = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    if (!srLinesData[coinId]) srLinesData[coinId] = [];
    srLinesData[coinId].push({ id, price, type });
    srLinesData[coinId].sort((a, b) => a.price - b.price);
    saveSRLines(coinId);
    renderSRList(coinId);
    drawSRPriceLines(coinId);
    // Reset form
    priceInput.value = '';
    const form = document.getElementById('sr-form-' + coinId);
    if (form) form.style.display = 'none';
  }

  function deleteSRLine(coinId, lineId) {
    if (!srLinesData[coinId]) return;
    // Remove from chart
    if (srPriceLines[coinId] && srPriceLines[coinId][lineId] && tvSeries[coinId]) {
      try { tvSeries[coinId].removePriceLine(srPriceLines[coinId][lineId]); } catch(e) {}
      delete srPriceLines[coinId][lineId];
    }
    // Remove from side tracker
    if (srLastSide[coinId]) delete srLastSide[coinId][lineId];
    // Remove from data
    srLinesData[coinId] = srLinesData[coinId].filter(l => l.id !== lineId);
    saveSRLines(coinId);
    renderSRList(coinId);
  }

  function drawSRPriceLines(coinId) {
    if (!tvSeries[coinId]) return;
    const lines = srLinesData[coinId] || [];
    // Remove old price line objects
    if (srPriceLines[coinId]) {
      Object.values(srPriceLines[coinId]).forEach(pl => {
        try { tvSeries[coinId].removePriceLine(pl); } catch(e) {}
      });
    }
    srPriceLines[coinId] = {};
    lines.forEach(line => {
      const color = line.type === 'support'
        ? 'rgba(74,222,128,0.75)'
        : 'rgba(248,113,113,0.75)';
      srPriceLines[coinId][line.id] = tvSeries[coinId].createPriceLine({
        price: line.price,
        color,
        lineWidth: 1,
        lineStyle: 0, // solid
        axisLabelVisible: true,
        title: line.type === 'support' ? 'S' : 'R',
      });
    });
  }

  function checkSRCrossings(coinId, price) {
    const lines = srLinesData[coinId];
    if (!lines || !lines.length) return;
    // On first call, just record sides — never fire on load
    if (!srLastSide[coinId]) {
      srLastSide[coinId] = {};
      lines.forEach(l => { srLastSide[coinId][l.id] = price >= l.price ? 'above' : 'below'; });
      return;
    }
    lines.forEach(line => {
      const newSide = price >= line.price ? 'above' : 'below';
      const oldSide = srLastSide[coinId][line.id];
      if (oldSide === undefined) {
        srLastSide[coinId][line.id] = newSide; return;
      }
      if (oldSide !== newSide) {
        const direction = newSide;
        showSRCrossAlert(coinId, line, direction);
        notifySRCross(coinId, line, direction);
      }
      srLastSide[coinId][line.id] = newSide;
    });
  }

  function showSRCrossAlert(coinId, line, direction) {
    const banner = document.getElementById('sr-alert-' + coinId);
    const text   = document.getElementById('sr-alert-text-' + coinId);
    if (!banner || !text) return;
    const coin = getCoin(coinId);
    const priceStr = fmtPrice(line.price, coin);
    let msg, colorCls;
    if (line.type === 'support' && direction === 'below') {
      msg = '▼ Support ' + priceStr + ' — Level Broken';    colorCls = 'down';
    } else if (line.type === 'support' && direction === 'above') {
      msg = '▲ Support ' + priceStr + ' — Reclaimed';       colorCls = 'up';
    } else if (line.type === 'resistance' && direction === 'above') {
      msg = '▲ Resistance ' + priceStr + ' — Breakout';     colorCls = 'up';
    } else {
      msg = '▼ Resistance ' + priceStr + ' — Rejected';     colorCls = 'down';
    }
    text.textContent = msg;
    banner.className = 'alert-banner visible ' + colorCls;
  }

  function dismissSRAlert(coinId) {
    const el = document.getElementById('sr-alert-' + coinId);
    if (el) el.className = 'alert-banner';
  }

  function notifySRCross(coinId, line, direction) {
    if (Notification.permission !== 'granted') return;
    const coin = getCoin(coinId);
    const priceStr = fmtPrice(line.price, coin);
    let title, body;
    if (line.type === 'support' && direction === 'below') {
      title = coin.symbol + ' — Support Broken';     body = 'Price dropped below support at ' + priceStr;
    } else if (line.type === 'support' && direction === 'above') {
      title = coin.symbol + ' — Support Reclaimed';  body = 'Price reclaimed support at ' + priceStr;
    } else if (line.type === 'resistance' && direction === 'above') {
      title = coin.symbol + ' — Resistance Breakout';body = 'Price broke out above ' + priceStr;
    } else {
      title = coin.symbol + ' — Resistance Rejected';body = 'Price rejected at resistance ' + priceStr;
    }
    new Notification(title, { body });
  }

  // ── Market Insight ───────────────────────────────────────────────────────────

  function generateInsight(coinId) {
    const c1    = tvAllCandles[coinId] && tvAllCandles[coinId][1];
    const c5    = tvAllCandles[coinId] && tvAllCandles[coinId][5];
    const c1440 = tvAllCandles[coinId] && tvAllCandles[coinId][1440];
    if (!c1 || !c5 || !c1440) return null;

    const t1  = computeTrend(c1);
    const t5  = computeTrend(c5);
    const t1d = computeTrend(c1440);
    if (!t1 || !t5 || !t1d) return null;

    const mom = computeMomentum(c5); // { label: 'Accelerating'|'Slowing'|'Steady', cls }
    const sym = getCoin(coinId).symbol;

    // RSI from 5m candles for consistency with MTF
    let rsi = null;
    if (c5.length > 15) {
      const rsiArr = calcRSI(c5, 14);
      if (rsiArr.length) rsi = rsiArr[rsiArr.length - 1].value;
    }

    // Recent price slope: last 6 vs prior 6 five-minute closes
    let slope = 'neutral';
    if (c5.length >= 12) {
      const prev6 = c5.slice(-12, -6).reduce((s, c) => s + c.close, 0) / 6;
      const last6 = c5.slice(-6).reduce((s, c) => s + c.close, 0) / 6;
      const pct   = (last6 - prev6) / prev6 * 100;
      slope = pct > 0.25 ? 'up' : pct < -0.25 ? 'down' : 'neutral';
    }

    const accel   = mom && mom.label === 'Accelerating';
    const slowing = mom && mom.label === 'Slowing';
    const lines   = [];

    // ── Line 1: short-term state + momentum ─────────────────────────────────
    if (t1.label === 'Strong Uptrend') {
      lines.push(accel
        ? sym + ' is surging with accelerating momentum — bulls firmly in control.'
        : slowing
          ? sym + ' is at extended levels, but momentum is beginning to fade.'
          : sym + ' is under strong bullish pressure across short timeframes.');
    } else if (t1.label === 'Uptrend') {
      if (t5.cls === 'up' && accel)
        lines.push(sym + ' is trending higher and momentum is building — constructive setup.');
      else if (slowing)
        lines.push(sym + ' is pushing higher but momentum is starting to slow.');
      else if (t5.cls === 'up')
        lines.push(sym + ' is trending higher across short timeframes.');
      else
        lines.push(sym + ' is recovering — short-term bias turning positive.');
    } else if (t1.label === 'Sideways') {
      if (accel || slope === 'up')
        lines.push(sym + ' is consolidating, but momentum is quietly building.');
      else if (t5.cls === 'down')
        lines.push(sym + ' is stalling after recent selling — no directional conviction.');
      else if (t5.cls === 'up')
        lines.push(sym + ' is pausing within a broader uptrend.');
      else
        lines.push(sym + ' is coiling — no clear short-term bias.');
    } else if (t1.label === 'Downtrend') {
      if (slowing)
        lines.push(sym + ' is drifting lower, but selling pressure is starting to ease.');
      else if (t5.cls === 'up')
        lines.push(sym + ' is pulling back after a short-term bounce — watch support.');
      else
        lines.push(sym + ' is losing ground on short-term momentum.');
    } else { // Strong Downtrend
      lines.push(accel
        ? sym + ' is under heavy selling pressure with momentum accelerating lower.'
        : sym + ' is under sustained selling pressure across short timeframes.');
    }

    // ── Line 2: multi-timeframe structure ────────────────────────────────────
    const allUp   = t1.cls === 'up'   && t5.cls === 'up'   && t1d.cls === 'up';
    const allDown = t1.cls === 'down' && t5.cls === 'down' && t1d.cls === 'down';

    if (allUp && accel) {
      lines.push('Trend aligned across all timeframes with accelerating momentum — strong continuation setup.');
    } else if (allUp) {
      lines.push(slowing
        ? 'Trend aligned across all timeframes, though momentum is fading — watch for a pullback.'
        : 'Trend aligned across all timeframes — momentum is strong and consistent.');
    } else if (allDown && accel) {
      lines.push('Selling pressure confirmed across all timeframes and intensifying.');
    } else if (allDown) {
      lines.push(slowing
        ? 'Selling across all timeframes, but momentum is easing — potential stabilisation ahead.'
        : 'Bears in control across all timeframes — no signs of a reversal yet.');
    } else if (t1d.cls === 'up' && t1.cls === 'down') {
      lines.push('Short-term weakness, but the higher timeframe structure is still holding.');
    } else if (t1d.cls === 'up' && t1.cls !== 'up') {
      lines.push(rsi !== null && rsi < 40
        ? 'Still above key structure — RSI dip may offer a re-entry opportunity.'
        : 'Still above key structure. No confirmed reversal yet.');
    } else if (t1d.cls === 'down' && t1.cls === 'up') {
      lines.push('Short-term bounce within a larger downtrend — caution on longs.');
    } else if (t1d.cls === 'down') {
      lines.push(slope === 'up'
        ? 'Below key structure — any bounce faces significant overhead resistance.'
        : 'Below key structure — overhead resistance likely to cap rallies.');
    } else if (t5.cls === 'up' && accel) {
      lines.push('Momentum building across timeframes — potential breakout forming.');
    } else if (t5.cls === 'up') {
      lines.push('Mid-term momentum remains constructive.');
    } else if (t5.cls === 'down' && t1d.cls !== 'down') {
      lines.push('Selling pressure increasing — watch for a breakdown below support.');
    } else {
      lines.push('Mixed signals across timeframes — await a clearer directional break.');
    }

    // ── Line 3: RSI addendum with trend context ──────────────────────────────
    if (rsi !== null) {
      if (rsi < 30) {
        lines.push(t1d.cls === 'up'
          ? 'RSI oversold within an uptrend — historically a high-probability bounce zone.'
          : 'RSI in oversold territory — a bounce may develop, but the broader trend is against it.');
      } else if (rsi < 38 && t1.cls !== 'up') {
        lines.push('RSI approaching oversold — watch for exhaustion or a potential reversal.');
      } else if (rsi > 70) {
        lines.push(accel
          ? 'RSI extended but momentum is still pushing — trend may continue short-term.'
          : 'RSI extended into overbought — short-term pullback risk is elevated.');
      } else if (rsi > 62 && t1.cls === 'up') {
        lines.push('RSI momentum is supporting the move higher.');
      }
    }

    return lines.slice(0, 3);
  }

  function generateCorrelationInsight(coinId) {
    const refId = 'bitcoin';
    const btcCandles = tvAllCandles[refId] && tvAllCandles[refId][5];
    if (!btcCandles) return null;
    const btcTrend = computeTrend(btcCandles);
    if (!btcTrend) return null;

    // For BTC itself compare against ETH as secondary reference
    const targetId = coinId === refId ? 'ethereum' : coinId;
    if (targetId === refId) return null;
    const coinCandles = tvAllCandles[targetId] && tvAllCandles[targetId][5];
    if (!coinCandles) return null;
    const coinTrend = computeTrend(coinCandles);
    if (!coinTrend) return null;

    const sym     = getCoin(targetId).symbol;
    const btcSym  = coinId === refId ? getCoin('ethereum').symbol : 'BTC';
    const btcDown = btcTrend.cls === 'down';
    const btcUp   = btcTrend.cls === 'up';
    const coinUp  = coinTrend.cls === 'up';
    const coinDown= coinTrend.cls === 'down';

    if (coinId === refId) {
      // BTC view: compare BTC vs ETH
      if (btcUp  && !coinUp)  return { text: btcSym + ' lagging → BTC leading the move', cls: 'lag' };
      if (btcDown && coinUp)  return { text: btcSym + ' diverging → relative strength vs BTC', cls: 'rs' };
      if (btcUp  && coinUp)   return { text: btcSym + ' aligned → broad market strength', cls: 'align' };
      if (btcDown && coinDown)return { text: btcSym + ' following → broad market weakness', cls: 'weak' };
      return null;
    }

    // All other coins vs BTC
    const btcSideways = btcTrend.cls === 'neutral';

    if (btcDown && coinUp)       return { text: 'BTC weakening → ' + sym + ' diverging, showing relative strength', cls: 'rs' };
    if (btcDown && coinDown)     return { text: 'BTC weakening → ' + sym + ' likely follows', cls: 'weak' };
    if (btcDown && btcSideways)  return null; // can't be both, guard
    if (btcDown)                 return { text: 'BTC weakening → ' + sym + ' holding for now', cls: 'weak' };
    if (btcUp   && coinDown)     return { text: sym + ' lagging → underperforming BTC\'s rally', cls: 'lag' };
    if (btcUp   && coinUp)       return { text: sym + ' aligned with BTC → broad momentum supportive', cls: 'align' };
    if (btcSideways && coinUp)   return { text: sym + ' diverging → showing strength vs flat BTC', cls: 'rs' };
    if (btcSideways && coinDown) return { text: sym + ' weakening → underperforming flat BTC', cls: 'lag' };
    return null;
  }

  function updateInsight(coinId) {
    const wrap = document.getElementById('insight-wrap-' + coinId);
    const el   = document.getElementById('insight-'      + coinId);
    if (!wrap || !el) return;
    const lines = generateInsight(coinId);
    if (!lines || !lines.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    const corr = generateCorrelationInsight(coinId);
    const corrHTML = corr
      ? '<div><span class="insight-corr ' + corr.cls + '">' + corr.text + '</span></div>'
      : '';
    el.innerHTML = lines.map(l => '<div class="insight-line">' + l + '</div>').join('') + corrHTML;
    updateExpandedInsight(coinId);
  }

  function updateExpandedInsight(coinId) {
    if (expandedCoin !== coinId) return;
    const el = document.getElementById('exp-insight');
    if (!el) return;
    const lines = generateInsight(coinId);
    if (!lines || !lines.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    const corr = generateCorrelationInsight(coinId);
    const corrHTML = corr
      ? '<div style="margin-top:0.3rem"><span class="exp-insight-corr ' + corr.cls + '">' + corr.text + '</span></div>'
      : '';
    el.innerHTML = lines
      .map(l => '<span class="exp-insight-line">' + l + '</span>')
      .join(' ') + corrHTML;
  }

  // ── Price fetching ───────────────────────────────────────────────────────────
  async function fetchAllPrices() {
    try {
      const ids = COINS.map(c => c.id).join(',');
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=' + ids + '&vs_currencies=usd');
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      COINS.forEach(coin => {
        if (data[coin.id] && data[coin.id].usd != null) updateCoinPrice(coin, data[coin.id].usd);
      });
      if (appView === 'home')   updateHomeDisplay();
      if (appView === 'detail' && appCoin) updateDetailUI(getCoin(appCoin));
    } catch(e) {}
  }

  function updateCoinPrice(coin, price) {
    const id = coin.id;
    const h  = priceHistory[id];
    h.push(price);
    if (h.length > 3) h.shift();
    coinHistory[id].push(price);
    if (coinHistory[id].length > 20) coinHistory[id].shift();
    updateSignal(id);
    evaluateZone(id);
    checkSRCrossings(id, price);
    updateExpandedPrice(id);
    updateExpandedSignal(id);
  }

  // ── Signal ───────────────────────────────────────────────────────────────────
  function computeSignal(coinId) {
    const h = coinHistory[coinId];
    if (h.length < 4) return null;
    const recent = h.slice(-10);
    const mid    = Math.floor(recent.length / 2);
    const oldAvg = recent.slice(0, mid).reduce((a, b) => a + b) / mid;
    const newAvg = recent.slice(mid).reduce((a, b) => a + b) / (recent.length - mid);
    const pct    = ((newAvg - oldAvg) / oldAvg) * 100;
    if (pct >  0.5) return { label: 'Strong Uptrend',   cls: 'strong-up' };
    if (pct >  0.1) return { label: 'Weak Uptrend',     cls: 'weak-up' };
    if (pct < -0.5) return { label: 'Strong Downtrend', cls: 'strong-down' };
    if (pct < -0.1) return { label: 'Weak Downtrend',   cls: 'weak-down' };
    return { label: 'Sideways', cls: 'sideways' };
  }

  function updateSignal(coinId) {
    const el  = document.getElementById('signal-' + coinId);
    const sig = computeSignal(coinId);
    if (!sig) {
      if (el) { el.textContent = '—'; el.className = 'sig-pill neutral'; }
      return;
    }
    if (el) { el.textContent = sig.label; el.className = 'sig-pill ' + sig.cls; }
    if (sig.label !== signalState[coinId]) {
      signalState[coinId] = sig.label;
      setSignalBanner(coinId, sig);
      notifySignal(coinId, sig);
      addMarker(coinId, 'signal', sig);
    }
  }

  function updateTrend(coinId) {
    const labelEl = document.getElementById('d-trend-label');
    const confEl  = document.getElementById('d-trend-conf');
    const momEl   = document.getElementById('d-trend-momentum');
    if (!labelEl) return;

    const fiveCandles = tvAllCandles[coinId] && tvAllCandles[coinId][5];
    const emaTrend    = fiveCandles ? computeTrend(fiveCandles)   : null;
    const emaMomentum = fiveCandles ? computeMomentum(fiveCandles): null;

    if (emaTrend) {
      labelEl.textContent = emaTrend.icon + ' ' + emaTrend.label;
      labelEl.className   = 'trend-val ' + emaTrend.cls;
      if (confEl)  { confEl.textContent  = emaTrend.confidence + '%'; confEl.className  = 'trend-val ' + emaTrend.cls; }
      if (momEl && emaMomentum) { momEl.textContent = emaMomentum.label; momEl.className = 'trend-val ' + emaMomentum.cls; }
      else if (momEl)           { momEl.textContent = '—';              momEl.className = 'trend-val neutral'; }
      return;
    }

    // Fallback: simple 3-price micro-trend
    const h = priceHistory[coinId];
    if (h.length >= 3) {
      const [a, b, c] = [h[h.length-3], h[h.length-2], h[h.length-1]];
      let label, cls;
      if (c > b && b > a)      { label = 'Up';     cls = 'up'; }
      else if (c < b && b < a) { label = 'Down';   cls = 'down'; }
      else                     { label = 'Stable'; cls = 'stable'; }
      labelEl.textContent = label; labelEl.className = 'trend-val ' + cls;
    } else {
      labelEl.textContent = '—'; labelEl.className = 'trend-val neutral';
    }
    if (confEl)  { confEl.textContent  = '—'; confEl.className  = 'trend-val neutral'; }
    if (momEl)   { momEl.textContent   = '—'; momEl.className   = 'trend-val neutral'; }
  }

  function setSignalBanner(coinId, sig) {
    const banner = document.getElementById('signal-banner-' + coinId);
    const text   = document.getElementById('signal-banner-text-' + coinId);
    if (!banner || !text) return;
    const dir = sig.cls.includes('up') ? 'up' : sig.cls.includes('down') ? 'down' : 'sideways';
    text.textContent = (dir === 'up' ? '▲' : dir === 'down' ? '▼' : '●') + ' Signal: ' + sig.label;
    banner.className = 'alert-banner visible ' + dir;
  }

  function dismissSignalBanner(coinId) {
    const el = document.getElementById('signal-banner-' + coinId);
    if (el) el.className = 'alert-banner';
  }

  function notifySignal(coinId, sig) {
    const coin  = getCoin(coinId);
    const cls   = sig.cls === 'up' || sig.cls === 'strong-up' ? 'up'
                : sig.cls === 'down' || sig.cls === 'strong-down' ? 'down' : 'info';
    showCoinAlert(coinId, coin.symbol + ' signal changed', sig.label, cls, 'low');
    if (Notification.permission === 'granted')
      new Notification(coin.symbol + ' signal: ' + sig.label, { body: coin.name });
  }

  // ── Share ─────────────────────────────────────────────────────────────────────
  function shareCurrentCoin() {
    const url = location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard', 'info'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast('Link copied to clipboard', 'info'); } catch(e) {}
      document.body.removeChild(ta);
    }
  }

  // ── Alert history ─────────────────────────────────────────────────────────────
  function relativeTime(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 10)   return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400)return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }

  function recordAlert(coinId, title, cls) {
    alertHistory.unshift({ coinId, title, cls, ts: Date.now() });
    if (alertHistory.length > 20) alertHistory.length = 20;
    if (!alertCenterOpen) { alertUnread++; _updateBell(); }
    _patchAlertCenter();
  }

  // ── Toast engine ─────────────────────────────────────────────────────────────
  const TOAST_ICONS = { up: '▲', down: '▼', warn: '⚠', info: '◆' };
  const ALERT_SHOW_MS  = 4500;
  const ALERT_PAUSE_MS = 2000;

  function _toastHTML(title, desc, cls) {
    const icon = TOAST_ICONS[cls] || '◆';
    return '<span class="toast-icon">' + icon + '</span>' +
      '<div class="toast-body">' +
        '<div class="toast-title">' + title + '</div>' +
        (desc ? '<div class="toast-desc">' + desc + '</div>' : '') +
      '</div>';
  }

  // Generic toast — for non-coin events (e.g. "Link copied")
  function showToast(title, cls, desc) {
    const stack = document.getElementById('toast-stack');
    if (!stack) return;
    const t = document.createElement('div');
    t.className = 'toast toast-' + (cls || 'info');
    t.innerHTML = _toastHTML(title, desc || '', cls);
    stack.appendChild(t);
    setTimeout(() => t.classList.add('toast-exit'), 3600);
    setTimeout(() => t.remove(), 4100);
  }

  // ── Coin alert engine — single-toast queue ───────────────────────────────────
  // Priorities: 'high' (zone), 'medium' (RSI/weak flip), 'low' (signal — history only)
  function _priNum(p) { return p === 'high' ? 3 : p === 'medium' ? 2 : 1; }

  function showCoinAlert(coinId, title, desc, cls, priority) {
    priority = priority || 'low';
    // Always record to history
    recordAlert(coinId, title, cls);

    // Low-priority or alerts-off coins: history only, no toast
    if (priority === 'low' || !_coinAlertsEnabled(coinId)) return;

    const priNum = _priNum(priority);
    alertQueue.push({ coinId, title, desc, cls, priNum });
    // Sort queue highest-priority first
    alertQueue.sort((a, b) => b.priNum - a.priNum);

    if (!activeToast) {
      _processAlertQueue();
    } else if (priNum > activeToast.priNum) {
      // Incoming is more urgent — bump current, show new immediately
      _dismissActiveToast(true);
      _processAlertQueue();
    }
  }

  function _processAlertQueue() {
    if (!alertQueue.length) { activeToast = null; return; }
    // Collapse 4+ queued alerts into a single summary
    if (alertQueue.length >= 4) {
      const count = alertQueue.length;
      alertQueue.length = 0;
      _showOneToast(null, count + ' alerts — tap to review', '', 'info', 1);
      return;
    }
    const next = alertQueue.shift();
    _showOneToast(next.coinId, next.title, next.desc, next.cls, next.priNum);
  }

  function _showOneToast(coinId, title, desc, cls, priNum) {
    const stack = document.getElementById('toast-stack');
    if (!stack) return;
    const el = document.createElement('div');
    el.className = 'toast toast-' + cls;
    el.innerHTML = _toastHTML(title, desc, cls) +
      '<button class="toast-dismiss" aria-label="Dismiss">✕</button>';
    stack.appendChild(el);
    activeToast = { priNum, timerId: null, el };

    el.querySelector('.toast-dismiss').addEventListener('click', e => {
      e.stopPropagation();
      _dismissActiveToast(false);
      setTimeout(_processAlertQueue, 300);
    });
    el.addEventListener('click', e => {
      if (e.target.classList.contains('toast-dismiss')) return;
      _dismissActiveToast(false);
      if (coinId) navigate('detail', coinId);
      else openAlertCenter();
    });

    function startTimer(ms) {
      if (!activeToast || activeToast.el !== el) return;
      activeToast.timerId = setTimeout(() => {
        _dismissActiveToast(false);
        setTimeout(_processAlertQueue, 300);
      }, ms);
    }
    el.addEventListener('mouseenter', () => { if (activeToast) clearTimeout(activeToast.timerId); });
    el.addEventListener('mouseleave',  () => startTimer(ALERT_PAUSE_MS));
    el.addEventListener('touchstart',  () => { if (activeToast) clearTimeout(activeToast.timerId); }, { passive: true });
    el.addEventListener('touchend',    () => startTimer(ALERT_PAUSE_MS));
    startTimer(ALERT_SHOW_MS);
  }

  function _dismissActiveToast(immediate) {
    if (!activeToast) return;
    clearTimeout(activeToast.timerId);
    const el = activeToast.el;
    activeToast = null;
    if (immediate) {
      el.remove();
    } else {
      el.classList.add('toast-exit');
      setTimeout(() => el.remove(), 450);
    }
  }

  // ── Bell & Alert Center UI ────────────────────────────────────────────────────
  function _updateBell() {
    const btn   = document.getElementById('bell-btn');

    if (newItems.length) {

    }
    if (oldItems.length) {
      html += '<div class="ac-section-lbl">Earlier</div>' + oldItems.map(rowHTML).join('');

  // ── Trend flip detection ──────────────────────────────────────────────────────
  function checkTrendFlip(coinId) {
    const c5 = tvAllCandles[coinId] && tvAllCandles[coinId][5];
    if (!c5) return;
    const t = computeTrend(c5);
    if (!t) return;
    const prev = trendFlipState[coinId];
    trendFlipState[coinId] = t.label;
    if (!prev || prev === t.label) return; // no change or first read

    const sym    = getCoin(coinId).symbol;
    const wasUp  = prev === 'Uptrend'   || prev === 'Strong Uptrend';
    const wasDown= prev === 'Downtrend' || prev === 'Strong Downtrend';
    const nowUp  = t.cls === 'up';
    const nowDown= t.cls === 'down';

    let title, desc, cls, priority;
    if      (!wasUp   && nowUp)               { title = sym + ' trend flipped';        desc = 'Momentum shifted to uptrend';       cls = 'up';   priority = 'high';   }
    else if (!wasDown && nowDown)             { title = sym + ' trend flipped';        desc = 'Momentum shifted to downtrend';     cls = 'down'; priority = 'high';   }
    else if (wasUp    && t.label==='Sideways'){ title = sym + ' lost momentum';        desc = 'Uptrend fading to sideways';        cls = 'warn'; priority = 'low';    }
    else if (wasDown  && t.label==='Sideways'){ title = sym + ' pressure easing';      desc = 'Selling slowing — trend flattening'; cls = 'info'; priority = 'low';   }
    else if (prev==='Strong Uptrend'   && t.label==='Uptrend')  { title = sym + ' momentum slowing';     desc = 'Strong uptrend losing steam';  cls = 'warn'; priority = 'medium'; }
    else if (prev==='Strong Downtrend' && t.label==='Downtrend'){ title = sym + ' sell pressure easing'; desc = 'Downtrend weakening slightly';  cls = 'info'; priority = 'medium'; }

    if (title) {
      showCoinAlert(coinId, title, desc, cls, priority);
      if (Notification.permission === 'granted')
        new Notification(title + ' — ' + desc, { body: getCoin(coinId).name });
    }
  }

  // ── RSI crossing detection ────────────────────────────────────────────────────
  function checkRSIAlert(coinId) {
    const c5 = tvAllCandles[coinId] && tvAllCandles[coinId][5];
    if (!c5 || c5.length < 15) return;
    const rsiData = calcRSI(c5, 14);
    if (!rsiData.length) return;
    const rsi  = rsiData[rsiData.length - 1].value;
    const prev = rsiAlertState[coinId];

    // Determine current zone (with exit buffers to prevent boundary flip-flop)
    let zone;
    if      (rsi < 30)  zone = 'oversold';
    else if (rsi > 70)  zone = 'overbought';
    else if (prev === 'oversold'   && rsi < 35) zone = 'oversold';   // hold until clear
    else if (prev === 'overbought' && rsi > 65) zone = 'overbought'; // hold until clear
    else                zone = 'normal';

    rsiAlertState[coinId] = zone;
    if (!prev || prev === zone) return; // no change or first read

    const sym = getCoin(coinId).symbol;
    let title, desc, cls;
    if      (zone === 'oversold'   && prev !== 'oversold')   { title = sym + ' RSI oversold';   desc = 'Watch for a potential bounce';    cls = 'warn'; }
    else if (zone === 'overbought' && prev !== 'overbought') { title = sym + ' RSI overbought'; desc = 'Momentum may be overextended';    cls = 'warn'; }
    else if (prev === 'oversold'   && zone === 'normal')     { title = sym + ' RSI recovering'; desc = 'Exiting oversold territory';      cls = 'up';   }
    else if (prev === 'overbought' && zone === 'normal')     { title = sym + ' RSI cooling';    desc = 'Overbought pressure releasing';   cls = 'info'; }

    if (title) {
      showCoinAlert(coinId, title, desc, cls, 'medium');
      if (Notification.permission === 'granted')
        new Notification(title + ' — ' + desc, { body: getCoin(coinId).name });
    }
  }

  // ── Zones ────────────────────────────────────────────────────────────────────
  function evaluateZone(coinId) {
    const h     = priceHistory[coinId];
    const price = h[h.length - 1];
    const buyEl  = document.getElementById('zone-buy-' + coinId);
    const sellEl = document.getElementById('zone-sell-' + coinId);
    if (!buyEl || !sellEl) return;
    const buy  = parseFloat(buyEl.value);
    const sell = parseFloat(sellEl.value);
    const statusEl = document.getElementById('zone-status-' + coinId);

    if (!price || (isNaN(buy) && isNaN(sell))) {
      if (statusEl) { statusEl.textContent = '—'; statusEl.className = 'zone-status neutral'; }
      return;
    }
    let zone = 'neutral';
    if (!isNaN(buy) && price < buy) zone = 'buy';
    else if (!isNaN(sell) && price > sell) zone = 'sell';

    if (statusEl) {
      statusEl.textContent = zone === 'buy' ? 'Buy Zone' : zone === 'sell' ? 'Sell Zone' : 'Neutral';
      statusEl.className = 'zone-status ' + zone;
    }
    if (zone !== zoneState[coinId]) {
      zoneState[coinId] = zone;
      setZoneBanner(coinId, zone);
      notifyZone(coinId, zone);
      if (zone === 'buy' || zone === 'sell') addMarker(coinId, zone);
      const sym = getCoin(coinId).symbol;
      if (zone === 'buy')  showCoinAlert(coinId, sym + ' entered buy zone',  'Price is below your buy target',  'up',   'high');
      if (zone === 'sell') showCoinAlert(coinId, sym + ' entered sell zone', 'Price is above your sell target', 'down', 'high');
    }
  }

  function setZoneBanner(coinId, zone) {
    const banner = document.getElementById('zone-banner-' + coinId);
    const text   = document.getElementById('zone-banner-text-' + coinId);
    if (!banner || !text) return;
    banner.className = 'alert-banner';
    if (zone === 'buy')       { text.textContent = '▼ Entered Buy Zone';    banner.classList.add('visible', 'buy'); }
    else if (zone === 'sell') { text.textContent = '▲ Entered Sell Zone';   banner.classList.add('visible', 'sell'); }
    else                      { text.textContent = '● Returned to Neutral'; banner.classList.add('visible', 'neutral'); }
  }

  function buildAssistantContext(coinId) {
    const coin   = getCoin(coinId);
    if (!coin) return null;
    const h      = priceHistory[coinId] || [];
    const price  = h.length ? fmtPrice(h[h.length - 1], coin) : null;
    const iv     = tvInterval[coinId] || 5;

    const mtf = [1, 5, 15, 60, 240, 1440].map(i => {
      const c = tvAllCandles[coinId] && tvAllCandles[coinId][i];
      return c ? { tf: tfLabel(i), trend: computeTrend(c) } : null;
    }).filter(Boolean);

    const activeCandles = tvAllCandles[coinId] && tvAllCandles[coinId][iv];
    const momentum      = activeCandles ? computeMomentum(activeCandles) : null;
    const rsiData       = activeCandles ? calcRSI(activeCandles, 14) : [];

             zone, insight, lines, recentAlerts };

  function _assistantGreeting(ctx) {
    if (!ctx) return 'Open a coin detail to load context.';
    const { coin, price, iv, mtf, momentum, rsiValue, rsiState, zone } = ctx;
    const cur = mtf.find(m => m.tf === tfLabel(iv));
    const sym = coin.symbol;

    // Line 1: what's happening
    const dirTxt = !cur ? 'data loading'
      : cur.trend.cls === 'up'   ? 'trending higher'
      : cur.trend.cls === 'down' ? 'trending lower'
      : 'moving sideways';
    let line1 = sym + (price ? ' at ' + price : '') + ' — ' + dirTxt + ' on the ' + tfLabel(iv) + ' chart.';

    const parts = [];
    if (momentum && momentum.cls === 'up')   parts.push('Selling pressure is building' );
    if (momentum && momentum.cls === 'warn') parts.push('Momentum is starting to ease'  );
    if (momentum && momentum.cls === 'neutral') parts.push('Trend is holding steadily'  );

      else if (rsiState === 'overbought') parts.push('RSI at ' + rsiValue + ', extended to the upside');

    if (zone !== 'neutral') parts.push(zone + ' zone active');

  function _buildContextResponse(prompt, ctx) {
    if (!ctx) return 'No coin context — open a coin detail first.';
    const { coin, price, iv, mtf, momentum, rsiValue, rsiState,
            zone, insight, lines, recentAlerts } = ctx;
    const p   = prompt.toLowerCase();
    const cur = mtf.find(m => m.tf === tfLabel(iv));
    const sym = coin.symbol;

    // helpers
    const dirWord = c => c.trend.cls === 'up' ? 'bullish' : c.trend.cls === 'down' ? 'bearish' : 'neutral';
    const momTxt  = momentum
      ? (momentum.cls === 'up' ? 'building' : momentum.cls === 'warn' ? 'easing' : 'steady') : null;
    const rsiTxt  = rsiValue !== null
      ? (rsiState === 'oversold'   ? 'RSI at ' + rsiValue + ', deep in oversold territory'
       : rsiState === 'overbought' ? 'RSI at ' + rsiValue + ', extended to the upside'
       :                             'RSI at ' + rsiValue) : null;

    // ── Explain this chart ────────────────────────────────────────────────────
    if (p.includes('explain') && p.includes('chart')) {
      if (!cur) return sym + ' chart data is still loading for the ' + tfLabel(iv) + ' timeframe.';
      const isDown = cur.trend.cls === 'down';
      const isUp   = cur.trend.cls === 'up';
      const line1  = sym + ' is ' + (isDown ? 'trending lower' : isUp ? 'trending higher' : 'moving sideways')
        + ' on the ' + tfLabel(iv) + ' chart'
        + (isDown ? ' — price has been making lower highs and remains below its short-term averages.'
         : isUp   ? ' — price is holding above its short-term averages with buyers in control.'
         :          ' — no clear directional bias from the current structure.');
      const whyParts = [
        isDown ? 'Price is below its short-term averages' : 'Price is above its short-term averages',
      ];
      if (momTxt) whyParts.push('selling pressure is ' + momTxt);
      if (rsiTxt) whyParts.push(rsiTxt);
      const watchLine = lines.length
        ? 'Watch ' + lines[0] + (lines[1] ? ' and ' + lines[1] : '') + ' for the next structural test.'
        : isDown
          ? 'Watch for a narrowing of the moving average spread and price stabilisation as early exhaustion signs.'
          : 'Watch for momentum to hold — a loss of the average would signal the trend is weakening.';
      return line1 + '\n' + whyParts.join(', ') + '.\n' + watchLine;
    }

    // ── Why did the signal change? ────────────────────────────────────────────
    if (p.includes('signal') && (p.includes('change') || p.includes('why'))) {
      if (!cur) return 'Signal data not yet loaded for the ' + tfLabel(iv) + ' timeframe.';
      const isDown = cur.trend.cls === 'down';
      const line1  = 'The short-term trend turned ' + dirWord(cur) + ' as price '
        + (isDown ? 'broke below its moving averages and failed to recover — sellers have been in control since.'
                  : 'pushed above its moving averages and held — buyers absorbed the selling.');
      const line2Parts = [];
      if (momTxt) line2Parts.push('momentum is ' + momTxt);
      if (rsiTxt) line2Parts.push(rsiTxt
        + (rsiState === 'oversold'   ? ', which often precedes a short-term exhaustion move'
         : rsiState === 'overbought' ? ', which can precede a fade or consolidation'
         : ''));
      const line2  = line2Parts.length ? line2Parts.join(' and ') + '.' : '';
      const watch  = isDown
        ? 'Watch for the first close back above the short-term average as the earliest sign of a shift.'
        : 'Watch for a pullback to the short-term average — a hold there confirms the trend is intact.';
      return line1 + (line2 ? '\n' + line2 : '') + '\n' + watch;
    }

    // ── What should I watch next? ─────────────────────────────────────────────
    if (p.includes('watch')) {
      const allUp   = mtf.length > 1 && mtf.every(m => m.trend.cls === 'up');
      const allDown = mtf.length > 1 && mtf.every(m => m.trend.cls === 'down');
      const shortTf = mtf.find(m => m.tf === '5m') || mtf[0];
      const longTf  = mtf.find(m => m.tf === '1D') || mtf[mtf.length - 1];
      const support = lines.find(l => l.startsWith('support'));
      const resist  = lines.find(l => l.startsWith('resistance'));
      if (allUp) {
        const momLine = momentum && momentum.cls === 'up'
          ? 'Momentum is accelerating — the trend has follow-through behind it.'
          : momentum && momentum.cls === 'warn'
            ? 'Momentum is starting to fade — the trend may be losing steam.'
            : 'Trend is holding steadily without notable acceleration.';
        return sym + ' is aligned bullish across all loaded timeframes.\n'
          + momLine + '\n'
          + (resist
              ? 'Watch ' + resist + ' as the next overhead test — a clean break would extend the move.'
              : 'Watch for a pullback to the short-term average as the first opportunity to gauge buyer strength.');
      }
      if (allDown) {
        const momLine = momentum && momentum.cls === 'warn'
          ? 'Selling pressure is starting to ease — the trend may be losing conviction.'
          : 'Selling pressure is sustained with no meaningful bounce attempt.';
        return sym + ' is under broad selling pressure across all loaded timeframes.\n'
          + momLine + '\n'
          + (support
              ? 'Watch ' + support + ' — a clean hold there sets up a potential base; a break opens further downside.'
              : 'Watch for price to stabilise and hold a level for multiple candles before any recovery becomes credible.');
      }
      // Mixed
      const conflict = shortTf && longTf && shortTf.trend.cls !== longTf.trend.cls;
      const contextLine = conflict
        ? shortTf.trend.cls === 'up'
          ? 'Short-term strength within a larger downtrend — this looks more like a counter-trend bounce than a reversal.'
          : 'Short-term weakness within a larger uptrend — this looks like a normal pullback, not a structural break.'
        : 'Signals are mixed across timeframes — there is no clean directional read right now.';
      return contextLine + '\n'
        + 'Wait for the ' + (shortTf ? shortTf.tf : '5m') + ' and '
        + (longTf ? longTf.tf : '1D') + ' to agree before committing to a direction.';
    }

    // ── Summarize this coin ───────────────────────────────────────────────────
    if (p.includes('summar') || p.includes('overview')) {
      const allDown = mtf.length > 1 && mtf.every(m => m.trend.cls === 'down');
      const allUp   = mtf.length > 1 && mtf.every(m => m.trend.cls === 'up');
      const tfShort = mtf.find(m => m.tf === '5m');
      const tfLong  = mtf.find(m => m.tf === '1D');
      const line1   = sym + (price ? ' at ' + price : '') + ' — '
        + (allDown ? 'under broad selling pressure across all loaded timeframes.'
         : allUp   ? 'in a broad uptrend across all loaded timeframes.'
         : 'showing mixed signals — ' + (tfShort ? tfShort.trend.label.toLowerCase() + ' short-term' : '')
           + (tfLong ? ', ' + tfLong.trend.label.toLowerCase() + ' on the daily' : '') + '.');
      const line2Parts = [];
      if (momTxt) line2Parts.push('Momentum is ' + momTxt);
      if (rsiTxt) line2Parts.push(rsiTxt);
      if (zone !== 'neutral') line2Parts.push(zone + ' zone is active');
      const line2 = line2Parts.length ? line2Parts.join('. ') + '.' : '';
      const insightLine = insight && insight.lines.length ? insight.lines[0] : '';
      return line1 + (line2 ? '\n' + line2 : '') + (insightLine ? '\n' + insightLine : '');
    }

    // ── Compare with [coin] ───────────────────────────────────────────────────
    if (p.includes('compar')) {
      const mentioned = COINS.find(c => c.id !== coin.id && (
        p.includes(c.symbol.toLowerCase()) || p.includes(c.name.toLowerCase())
      )) || (coin.id !== 'bitcoin' ? getCoin('bitcoin') : getCoin('ethereum'));
      const targetCtx = mentioned ? buildAssistantContext(mentioned.id) : null;
      if (!targetCtx) return 'Could not find that coin. Try: "Compare with ETH" or "Compare with SOL".';
      const t1   = cur;
      const t2   = targetCtx.mtf.find(m => m.tf === tfLabel(iv)) || targetCtx.mtf.find(m => m.tf === '5m');
      const same = t1 && t2 && t1.trend.cls === t2.trend.cls;
      const line1 = sym + ' and ' + mentioned.symbol + ' are both '
        + (same
            ? (t1 && t1.trend.cls === 'up' ? 'trending higher' : 'trending lower')
              + ' on the ' + tfLabel(iv) + ' chart — the move looks broad rather than coin-specific.'
            : 'moving in different directions on the ' + tfLabel(iv) + ' chart — '
              + sym + ' is ' + (t1 ? dirWord(t1) : '—') + ', '
              + mentioned.symbol + ' is ' + (t2 ? dirWord(t2) : '—') + '.');
      const line2 = same
        ? 'When leading assets move together like this, it typically reflects market-wide pressure rather than individual setups.'
        : sym + ' is diverging from ' + mentioned.symbol + ' — that split is worth watching for a potential independent move.';
      const watch = same
        ? 'Watch for one to stabilise first — that is usually the early signal that a broader recovery is beginning.'
        : 'Watch which one resolves its trend first, as that tends to pull the other in the same direction.';
      return line1 + '\n' + line2 + '\n' + watch;
    }

    // ── Default: state snapshot ───────────────────────────────────────────────
    const shortTf  = mtf.find(m => m.tf === '5m') || mtf[0];
    const longTf   = mtf.find(m => m.tf === '1D') || mtf[mtf.length - 1];
    const dirShort = shortTf ? dirWord(shortTf) : '—';
    const dirLong  = longTf  ? dirWord(longTf)  : '—';
    const line1 = sym + (price ? ' at ' + price : '') + ' — '
      + dirShort + ' short-term' + (longTf && longTf !== shortTf ? ', ' + dirLong + ' on the daily.' : '.');
    const extras = [rsiTxt, momTxt ? 'Momentum ' + momTxt : null, lines[0] || null].filter(Boolean).join('. ');
    return line1 + (extras ? '\n' + extras + '.' : '');
  }

      return '<div class="ai-msg ' + cls + '"><div class="ai-bubble">' + text + '</div></div>';

  function sendAssistantMessage() {
    const inp = document.getElementById('ai-input');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';

    assistantMsgs.push({ role: 'user', text });
    // Show typing indicator
    const el = document.getElementById('ai-messages');
    if (el) {
      _renderAIMsgs();
      el.innerHTML += '<div class="ai-msg ai-msg-assistant" id="ai-typing-ind">'
        + '<div class="ai-bubble ai-typing"><span></span><span></span><span></span></div></div>';
      el.scrollTop = el.scrollHeight;
    }
    const btn = document.querySelector('.ai-send-btn');
    if (btn) btn.disabled = true;

    (async () => {
      try {
        const ctx    = appCoin ? buildAssistantContext(appCoin) : null;
        const market = ctx ? {
          coin:       ctx.coin ? { id: ctx.coin.id, symbol: ctx.coin.symbol, name: ctx.coin.name } : null,
          price:      ctx.price,
          timeframe:  tfLabel(ctx.iv),
          signal:     (ctx.mtf.find(m => m.tf === tfLabel(ctx.iv))?.trend?.label) ?? null,
          confidence: (ctx.mtf.find(m => m.tf === tfLabel(ctx.iv))?.trend?.confidence) ?? null,
          momentum:   ctx.momentum?.label ?? null,
          rsi:        { value: ctx.rsiValue, state: ctx.rsiState },
          zones: {
            current:    ctx.zone,
            support:    (ctx.lines || []).filter(l => l.startsWith('support')),
            resistance: (ctx.lines || []).filter(l => l.startsWith('resistance')),
          },
          mtf:     ctx.mtf.map(m => ({ tf: m.tf, trend: m.trend?.label ?? null, confidence: m.trend?.confidence ?? null })),
          insight: ctx.insight,
          news:    [],
        } : null;

        const history = assistantMsgs.slice(-10);
        const res     = await fetch('/api/assistant', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text, history, market, mode: assistantMode }),
        });
        const data = await res.json();
        assistantMsgs.push({ role: 'assistant', text: data.response || data.error || 'No response.' });
      } catch (e) {
        assistantMsgs.push({ role: 'assistant', text: 'Connection error — is the server running?' });
      }
      _renderAIMsgs();
      if (btn) btn.disabled = false;
      const input = document.getElementById('ai-input');
      if (input) input.focus();
    })();
  }

        '<div class="auth-field"><label>Confirm password</label><input id="signup-confirm" type="password" autocomplete="new-password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')submitSignup()" /></div>' +
        '<button id="auth-submit-btn" class="auth-submit" onclick="submitSignup()">Create account</button>' +
        '<p class="auth-switch">Already have an account? <button onclick="showAuthView(\'login\')">Sign in</button></p>' +
      '</div>' +

      // Profile / logged-in view
      '<div id="auth-view-profile" style="display:none">' +
        '<div class="auth-title">Account</div>' +
        '<p style="text-align:center;font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:1.5rem" id="auth-profile-email"></p>' +
        '<hr class="auth-divider" />' +
        '<button class="auth-signout-btn" onclick="signOut()">Sign out</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(authOverlay);

  // If already logged in, show profile view when modal opened
  const _origOpenAuthModal = openAuthModal;
  window.openAuthModal = function(contextMsg, callback) {
    if (authUser && !callback) {
      // Show profile view
      _authModalCallback = null;
      const overlay = document.getElementById('auth-overlay');
      if (!overlay) return;
      showAuthView('profile');
      const emailEl = document.getElementById('auth-profile-email');
      if (emailEl) emailEl.textContent = authUser.email;
      overlay.classList.add('open');
    } else {
      _origOpenAuthModal(contextMsg, callback);
    }
  };

  // Boot: honour any hash in the URL (e.g. shared link #/coin/bitcoin)
  handleHashRoute();

  // Splash: enforce a minimum display time so it never flickers on fast connections
  const splashEl      = document.getElementById('splash');
  const splashShownAt = Date.now();
  const SPLASH_MIN_MS = 400;

  function dismissSplash() {
    const elapsed = Date.now() - splashShownAt;
    const delay   = Math.max(0, SPLASH_MIN_MS - elapsed);
    setTimeout(() => {
      if (!splashEl) return;
      splashEl.classList.add('splash-hidden');
      splashEl.addEventListener('transitionend', () => splashEl.remove(), { once: true });
    }, delay);
  }

  fetchAllPrices().then(dismissSplash).catch(dismissSplash);
  setInterval(fetchAllPrices, 30000);

  // Register service worker for PWA / home screen support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

</script>
</body>
</html>
