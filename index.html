<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aureon</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Aureon">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #000; }

    body {
      min-height: 100vh;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shared layout ── */
    .page-wrap { width: 100%; max-width: 680px; margin: 0 auto; padding: 0 1.25rem 4rem;
      /* safe-area insets for iPhone notch / Dynamic Island / home indicator */
      padding-left:  max(1.25rem, env(safe-area-inset-left));
      padding-right: max(1.25rem, env(safe-area-inset-right));
      padding-bottom: max(4rem, calc(4rem + env(safe-area-inset-bottom)));
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: #a78bfa;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 999px;
      padding: 0.28rem 0.8rem;
      margin-bottom: 0.75rem;
    }

    /* ── Home hero ── */
    .home-hero {
      position: relative; text-align: center;
      padding: 2.75rem 0 2rem;
      padding-top: max(2.75rem, calc(env(safe-area-inset-top) + 1rem));
    }
    .hero-logo {
      display: flex; justify-content: center; align-items: center;
      margin-bottom: 0.9rem;
    }
    .hero-logo .brand-logo-img { height: 160px; width: auto; }
    .hero-tagline {
      font-size: 0.84rem; color: rgba(255,255,255,0.75); font-weight: 500; margin: 0 0 1.25rem;
      letter-spacing: 0.01em; line-height: 1.5;
    }
    /* ── Home header (legacy, kept for standalone safe-area override) ── */
    .home-header { padding: 2.25rem 0 1.5rem; text-align: center;
      padding-top: max(2.25rem, calc(env(safe-area-inset-top) + 0.75rem));
    }
    .home-logo {
      display: flex; justify-content: center; align-items: center;
      margin-bottom: 1.5rem;
    }
    .brand-lockup {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-logo-img { height: 36px; width: auto; flex-shrink: 0; mix-blend-mode: screen; }
    .splash-brand .brand-logo-img { height: 44px; }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 0.25rem; }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 14px;
      padding: 0.95rem 1rem 0.95rem 2.9rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-input:focus {
      border-color: rgba(139,92,246,0.7);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }
    .search-icon {
      position: absolute; left: 0.95rem; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.4); font-size: 1.05rem; pointer-events: none; line-height: 1;
    }
    .search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200;
      background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px;
      overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .search-result-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1rem;
      cursor: pointer; transition: background 0.1s;
    }
    .search-result-item:hover { background: #222; }
    .search-result-item + .search-result-item { border-top: 1px solid #222; }
    .sr-name   { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .sr-symbol { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
    .sr-price  { margin-left: auto; font-size: 0.84rem; color: rgba(255,255,255,0.6); font-weight: 600; }

    /* ── Label utility ── */
    .label { color: rgba(255,255,255,0.6); }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.75); margin-bottom: 1rem; padding-top: 2.75rem;
    }
    .section-count {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 0.5em; padding: 0 0.45em; height: 1.4em;
      background: rgba(217,182,90,0.12); color: #D9B65A;
      border: 1px solid rgba(217,182,90,0.25); border-radius: 4px;
      font-size: 0.75em; font-weight: 600; letter-spacing: 0.02em; vertical-align: middle;
    }
    .fav-section-hint {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.04em;
      text-transform: none; color: rgba(255,255,255,0.5);
    }

    /* ── Favorites strip ── */
    .fav-strip {
      display: flex; gap: 0.6rem; overflow-x: auto; padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .fav-strip::-webkit-scrollbar { display: none; }
    .fav-chip {
      flex-shrink: 0; min-width: 120px;
      background: #111; border: 1px solid #222;
      border-top: 2px solid var(--chip-color, #2a2a2a);
      border-radius: 14px;
      padding: 0.75rem 1rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .fav-chip:hover { background: #161616; border-color: #333; border-top-color: var(--chip-color, #333); }
    .fav-chip-sym {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.35rem;
    }
    .fav-chip-price { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .fav-chip-chg   { font-size: 0.7rem; font-weight: 600; margin-top: 0.2rem; }
    .fav-empty { font-size: 0.8rem; padding: 0.5rem 0 0.75rem; }
    .favorites-empty { color: rgba(255,255,255,0.7); font-weight: 500; letter-spacing: 0.2px; }

    /* ── Smart sections ── */
    .smart-section { padding-top: 2.75rem; }
    .smart-section-label {
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75); margin-bottom: 0.9rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .smart-strip {
      display: flex; gap: 0.55rem; overflow-x: auto; padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .smart-strip::-webkit-scrollbar { display: none; }
    .smart-chip {
      flex-shrink: 0; min-width: 112px;
      background: #111; border: 1px solid #1e1e1e;
      border-top: 2px solid var(--chip-color, #2a2a2a);
      border-radius: 14px;
      padding: 0.65rem 0.9rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .smart-chip:hover { background: #161616; }
    .smart-chip-sym {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.35rem;
    }
    .smart-chip-label {
      font-size: 0.68rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.2;
    }
    .smart-chip-price { font-size: 0.92rem; font-weight: 700; color: #fff; }

    /* ── Coin dot (fallback) + logo ── */
    .cdot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .clogo { border-radius: 50%; object-fit: cover; flex-shrink: 0; display: inline-block; }

    /* ── Top movers grid ── */
    .movers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .mover-card {
      background: #111; border: 1px solid #1e1e1e; border-radius: 14px;
      padding: 0.85rem 1rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .mover-card:hover { background: #161616; border-color: #2a2a2a; }
    .mover-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.35rem; }
    .mover-meta { display: flex; flex-direction: column; gap: 0.15rem; }
    .mover-sym { font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
    .mover-name { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
    .mover-price { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .mover-chg { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.45rem; border-radius: 999px; flex-shrink: 0; }

    /* ── Change pills ── */
    .up-pill     { color: #4ade80; background: rgba(74,222,128,0.1); }
    .down-pill   { color: #f87171; background: rgba(248,113,113,0.1); }
    .up-text     { color: #4ade80; }
    .down-text   { color: #f87171; }
    .neutral-text{ color: rgba(255,255,255,0.5); }

    /* ── All coins list ── */
    .coin-list { display: flex; flex-direction: column; gap: 0.35rem; }
    .coin-list-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.85rem 0.9rem;
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .coin-list-item:hover  { background: #161616; border-color: #252525; }
    .coin-list-item:active { background: #1c1c1c; }
    .coin-list-item.is-fav { border-top: 2px solid rgba(245,158,11,0.35); }
    .cli-sym    { font-size: 0.88rem; font-weight: 600; color: #fff; min-width: 44px; }
    .cli-name   { font-size: 0.75rem; color: rgba(255,255,255,0.6); flex: 1; }
    .cli-price  { font-size: 1.05rem; font-weight: 700; color: #fff; text-align: right; }
    .cli-chg    { font-size: 0.74rem; font-weight: 600; min-width: 62px; text-align: right; }

    @media (min-width: 540px) {
      .coin-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.35rem; }
    }

    /* ══════════════════ DETAIL VIEW ══════════════════ */

    .detail-wrap { width: 100%; max-width: 780px; margin: 0 auto; padding: 0 1.25rem 4rem;
      padding-left:  max(1.25rem, env(safe-area-inset-left));
      padding-right: max(1.25rem, env(safe-area-inset-right));
      padding-bottom: max(4rem, calc(4rem + env(safe-area-inset-bottom)));
    }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 0 0.85rem; gap: 0.5rem;
      padding-top: max(1.1rem, calc(env(safe-area-inset-top) + 0.5rem));
    }
    .back-btn {
      font-size: 1.35rem; font-weight: 300; color: rgba(255,255,255,0.6);
      background: none; border: none; cursor: pointer;
      padding: 0.1rem 0.2rem; transition: color 0.15s; flex-shrink: 0; line-height: 1;
    }
    .back-btn:hover { color: #fff; }
    .detail-header-id {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 0.4rem; overflow: hidden;
    }
    .dhi-sym  {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.02em;
      color: var(--coin-color, #e4e4e7); white-space: nowrap;
    }
    .dhi-name {
      font-size: 0.8rem; font-weight: 400; color: rgba(255,255,255,0.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-header-actions { display: flex; align-items: center; gap: 0.1rem; flex-shrink: 0; }
    .share-btn {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
      background: none; border: none; padding: 0.2rem 0.35rem;
      cursor: pointer; color: rgba(255,255,255,0.6); transition: color 0.15s; line-height: 1;
    }
    .share-btn:hover { color: #fff; }
    .fav-btn {
      font-size: 1.2rem; background: none; border: none;
      padding: 0.1rem 0.2rem; cursor: pointer; color: rgba(255,255,255,0.4);
      transition: color 0.2s; line-height: 1; flex-shrink: 0;
    }
    .fav-btn:hover  { color: rgba(255,255,255,0.8); }
    .fav-btn.is-fav { color: #f59e0b; }

    .detail-price-row {
      display: flex; align-items: baseline; gap: 0.75rem;
      margin-bottom: 1.75rem; flex-wrap: wrap;
    }
    .detail-price {
      font-size: clamp(2rem, 7vw, 3.25rem); font-weight: 700;
      letter-spacing: -0.04em; line-height: 1; color: #fff;
    }
    .detail-price.loading { color: #222; }
    .detail-chg { font-size: 0.9rem; font-weight: 600; }

    /* ── Detail cards ── */
    .dcard {
      background: #111; border: 1px solid #1e1e1e; border-radius: 18px;
      padding: 1.25rem 1.5rem; margin-bottom: 0.75rem;
    }
    .dcard-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 1rem;
    }

    /* ── Chart ── */
    .detail-chart-container { height: 280px; }
    @media (max-width: 420px) { .detail-chart-container { height: 210px; } }

    /* ── RSI panel ── */
    .detail-rsi-container { height: 80px; margin-top: 2px; }
    @media (max-width: 420px) { .detail-rsi-container { height: 60px; } }

    /* ── Multi-timeframe summary ── */
    .mtf-wrap   { margin-top: 1rem; padding-top: 0.85rem; border-top: 1px solid #1e1e1e; }
    .mtf-header { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 0.6rem; }
    .mtf-row    { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .mtf-item   { background: #0a0a0a; border-radius: 8px; padding: 0.5rem 0.75rem; }
    .mtf-tf     { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.06em; color: rgba(255,255,255,0.6); margin-bottom: 0.3rem; line-height: 1.3; }
    .mtf-val    { font-size: 0.69rem; font-weight: 700; line-height: 1.2; }
    .mtf-conf   { font-size: 0.6rem; font-weight: 600; color: rgba(255,255,255,0.6); margin-top: 0.22rem; letter-spacing: 0.03em; }

    /* ── Market Insight ── */
    .insight-wrap   { margin-top: 1rem; padding-top: 0.85rem; border-top: 1px solid #1e1e1e; }
    .insight-header { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 0.55rem; }
    .insight-text   { display: flex; flex-direction: column; gap: 0.18rem; }
    .market-insight { color: rgba(255,255,255,0.8); line-height: 1.5; }
    .insight-line   { font-size: 0.85rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
    .insight-line:first-child { color: #fff; font-weight: 500; }
    .insight-corr { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.6rem;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em;
      padding: 0.2rem 0.6rem; border-radius: 999px; }
    .insight-corr.rs    { color: #4ade80; background: rgba(74,222,128,0.1); }
    .insight-corr.weak  { color: #f87171; background: rgba(248,113,113,0.1); }
    .insight-corr.lag   { color: #f59e0b; background: rgba(245,158,11,0.1); }
    .insight-corr.align { color: #60a5fa; background: rgba(96,165,250,0.1); }
    .exp-insight-corr { display: inline-block; margin-top: 0.35rem;
      font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 999px; }
    .exp-insight-corr.rs    { color: #4ade80; background: rgba(74,222,128,0.1); }
    .exp-insight-corr.weak  { color: #f87171; background: rgba(248,113,113,0.1); }
    .exp-insight-corr.lag   { color: #f59e0b; background: rgba(245,158,11,0.1); }
    .exp-insight-corr.align { color: #60a5fa; background: rgba(96,165,250,0.1); }

    /* ── Expanded MTF summary bar ── */
    .exp-mtf-summary {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.4rem 1rem 0.1rem;
      flex-shrink: 0;
    }
    .exp-mtf-dot  { color: #1e1e1e; font-size: 0.75rem; flex-shrink: 0; }
    .exp-mtf-item { display: flex; align-items: center; gap: 0.35rem; }
    .exp-mtf-tf   { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.6); flex-shrink: 0; }
    .exp-mtf-val  { font-size: 0.7rem; font-weight: 700; }

    .exp-insight {
      padding: 0.3rem 1.25rem 0;
      font-size: 0.74rem; color: rgba(255,255,255,0.8); line-height: 1.55;
      text-align: center; flex-shrink: 0;
    }
    .exp-insight-line + .exp-insight-line::before { content: ' '; }

    @media (orientation: landscape) and (max-height: 500px) {
      .exp-mtf-summary { display: none; }
      .exp-insight     { display: none; }
    }

    /* ── Timeframe buttons ── */
    .tf-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .tf-group {
      background: #0a0a0a; border-radius: 8px; padding: 3px;
      display: inline-flex; gap: 2px;
    }
    .tf-btn {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 6px;
      border: none; background: transparent; color: rgba(255,255,255,0.6);
      cursor: pointer; transition: all 0.15s;
    }
    .tf-btn:hover { color: rgba(255,255,255,0.9); }
    .tf-btn.active {
      background: color-mix(in srgb, var(--coin-color, #a78bfa) 18%, #1e1e1e);
      color: var(--coin-color, #a78bfa);
    }
    .chart-status { min-height: 1.2rem; }

    /* ── Loading dots ── */
    @keyframes dot-pulse {
      0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
      40%         { opacity: 1;   transform: scale(1); }
    }
    .chart-dots { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 0.5rem 0; }
    .chart-dots span { width: 5px; height: 5px; border-radius: 50%; background: #3a3a3a; animation: dot-pulse 1.4s ease-in-out infinite; }
    .chart-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chart-dots span:nth-child(3) { animation-delay: 0.4s; }
    .chart-err { font-size: 0.75rem; color: #f87171; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.4rem 0; }
    .retry-btn { background: none; border: 1px solid rgba(248,113,113,0.3); color: #f87171; border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.68rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .retry-btn:hover { background: rgba(248,113,113,0.1); }

    /* ── Zone section ── */
    .zone-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .zone-inputs { display: flex; gap: 0.75rem; }
    .zone-field { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .zone-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .zone-input-wrap {
      display: flex; align-items: center;
      background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 0 0.7rem; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .zone-input-wrap:focus-within { border-color: rgba(167,139,250,0.3); box-shadow: 0 0 0 2px rgba(167,139,250,0.06); }
    .zone-prefix { color: rgba(255,255,255,0.6); font-size: 0.88rem; font-weight: 600; }
    .zone-input { flex: 1; background: transparent; border: none; padding: 0.55rem 0.4rem; font-size: 0.88rem; color: #fff; outline: none; width: 100%; }
    .zone-status {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.22rem 0.6rem; border-radius: 999px; border: 1px solid transparent; white-space: nowrap;
    }
    .zone-status.buy     { color: #4ade80; background: rgba(74,222,128,0.1);  border-color: rgba(74,222,128,0.25); }
    .zone-status.sell    { color: #f87171; background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); }
    .zone-status.neutral { color: #71717a; background: rgba(255,255,255,0.03); border-color: #252525; }

    /* ── Toast notifications ── */
    #toast-stack {
      position:fixed; left:50%; transform:translateX(-50%);
      top: max(1rem, calc(env(safe-area-inset-top) + 0.5rem));
      width:min(92vw, 380px); z-index:3000;
      display:flex; flex-direction:column; gap:0.5rem; pointer-events:none;
    }
    .toast {
      display:flex; align-items:flex-start; gap:0.7rem;
      padding:0.8rem 0.75rem 0.8rem 0.95rem;
      border-radius:14px; border:1px solid;
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      pointer-events:auto;
      animation: toast-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .toast-icon    { font-size:0.82rem; flex-shrink:0; margin-top:0.12rem; line-height:1; opacity:0.85; }
    .toast-body    { flex:1; display:flex; flex-direction:column; gap:0.1rem; min-width:0; }
    .toast-title   { font-size:0.78rem; font-weight:700; letter-spacing:0.01em; line-height:1.3; }
    .toast-desc    { font-size:0.69rem; font-weight:400; line-height:1.45; opacity:0.75; }
    .toast-dismiss {
      background:none; border:none; cursor:pointer; font-size:0.6rem;
      opacity:0.5; padding:0.15rem 0.05rem; line-height:1;
      color:inherit; flex-shrink:0; margin-top:0.12rem; transition:opacity 0.15s;
    }
    .toast-dismiss:hover { opacity:0.9; }
    .toast-up   {
      color:#4ade80;
      background:linear-gradient(145deg,rgba(8,20,10,0.96),rgba(4,12,6,0.96));
      border-color:rgba(74,222,128,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.55),0 0 28px rgba(74,222,128,0.06),inset 0 1px 0 rgba(74,222,128,0.07);
    }
    .toast-down {
      color:#f87171;
      background:linear-gradient(145deg,rgba(22,8,8,0.96),rgba(14,4,4,0.96));
      border-color:rgba(248,113,113,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.55),0 0 28px rgba(248,113,113,0.06),inset 0 1px 0 rgba(248,113,113,0.07);
    }
    .toast-warn {
      color:#f59e0b;
      background:linear-gradient(145deg,rgba(20,14,4,0.96),rgba(12,9,3,0.96));
      border-color:rgba(245,158,11,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.55),0 0 28px rgba(245,158,11,0.05),inset 0 1px 0 rgba(245,158,11,0.07);
    }
    .toast-info {
      color:#a78bfa;
      background:linear-gradient(145deg,rgba(14,10,24,0.96),rgba(8,6,16,0.96));
      border-color:rgba(167,139,250,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.55),0 0 28px rgba(167,139,250,0.07),inset 0 1px 0 rgba(167,139,250,0.07);
    }
    .toast-exit { opacity:0; transform:translateY(-6px) scale(0.97); transition:opacity 0.35s ease,transform 0.35s ease; }
    @keyframes toast-in { from { opacity:0; transform:translateY(-14px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* ── Alert history ── */
    .alert-history-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .alert-history-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 0.45rem;
    }
    .alert-history-count {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em;
      background: rgba(167,139,250,0.12); color: #a78bfa;
      border-radius: 999px; padding: 0.08rem 0.45rem;
    }
    .ah-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .ah-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.52rem 0.75rem; border-radius: 10px;
      background: #0a0a0a; border: 1px solid #181818;
      cursor: pointer; transition: background 0.12s;
    }
    .ah-item:hover { background: #111; }
    .ah-icon {
      font-size: 0.62rem; flex-shrink: 0;
      width: 1.35rem; height: 1.35rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .ah-icon.up   { color: #4ade80; background: rgba(74,222,128,0.1); }
    .ah-icon.down { color: #f87171; background: rgba(248,113,113,0.1); }
    .ah-icon.warn { color: #f59e0b; background: rgba(245,158,11,0.1); }
    .ah-icon.info { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .ah-sym   { font-size: 0.7rem; font-weight: 700; color: #fff; flex-shrink: 0; min-width: 2.2rem; }
    .ah-title { font-size: 0.71rem; color: rgba(255,255,255,0.8); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ah-time  { font-size: 0.62rem; color: rgba(255,255,255,0.5); flex-shrink: 0; padding-left: 0.4rem; }

    /* ── Alert banners ── */
    .alert-banner {
      display: none; align-items: center; justify-content: space-between; gap: 0.75rem;
      border-radius: 12px; padding: 0.7rem 1rem; margin-bottom: 0.85rem;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .alert-banner.visible      { display: flex; }
    .alert-banner.visible.buy  { color: #4ade80; background: rgba(74,222,128,0.08);  border: 1px solid rgba(74,222,128,0.2); }
    .alert-banner.visible.sell { color: #f87171; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
    .alert-banner.visible.neutral { color: #a1a1aa; background: rgba(255,255,255,0.03); border: 1px solid #252525; }
    .alert-banner.visible.up   { color: #4ade80; background: rgba(74,222,128,0.07);  border: 1px solid rgba(74,222,128,0.18); }
    .alert-banner.visible.down { color: #f87171; background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.18); }
    .alert-banner.visible.sideways { color: #60a5fa; background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.18); }
    .dismiss-btn { background: none; border: none; cursor: pointer; font-size: 0.85rem; opacity: 0.55; color: inherit; padding: 0; flex-shrink: 0; }
    .dismiss-btn:hover { opacity: 1; }

    /* ── Signal utility ── */
    .signal { font-weight: 600; }

    /* ── Signal card ── */
    .signal-stats { display: grid; grid-template-columns: 1fr 1fr; row-gap: 1.1rem; }
    .stat-item { display: flex; flex-direction: column; gap: 0.35rem; }
    .stat-item:nth-child(even) { border-left: 1px solid #1e1e1e; padding-left: 1.5rem; }
    .stat-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .trend-val { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: baseline; gap: 0.35rem; flex-wrap: wrap; }
    .trend-val.up      { color: #4ade80; }
    .trend-val.down    { color: #f87171; }
    .trend-val.warn    { color: #f59e0b; }
    .trend-val.stable  { color: #60a5fa; }
    .trend-val.neutral { color: rgba(255,255,255,0.5); }
    .trend-val-conf { font-size: 0.6rem; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; text-transform: none; }
    .sig-pill { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.22rem 0.6rem; border-radius: 999px; display: inline-block; }
    .sig-pill.strong-up   { color: #4ade80; background: rgba(74,222,128,0.1); }
    .sig-pill.weak-up     { color: #86efac; background: rgba(134,239,172,0.08); }
    .sig-pill.sideways    { color: #60a5fa; background: rgba(96,165,250,0.1); }
    .sig-pill.weak-down   { color: #fca5a5; background: rgba(252,165,165,0.08); }
    .sig-pill.strong-down { color: #f87171; background: rgba(248,113,113,0.1); }
    .sig-pill.neutral     { color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }

    /* ── Expanded chart modal ── */
    #chart-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: #000;
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      will-change: opacity, transform;
    }
    #chart-modal.open {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    .exp-header {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.65rem 1rem 0.55rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--coin-color, #a78bfa) 9%, transparent) 0%,
        transparent 100%);
    }
    .exp-close-btn {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.6);
      background: none; border: none; cursor: pointer; padding: 0;
      transition: color 0.15s; flex-shrink: 0; white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .exp-close-btn:hover { color: #fff; }
    .exp-divider { color: #1e1e1e; flex-shrink: 0; font-size: 0.9rem; }
    .exp-coin-info { display: flex; align-items: center; gap: 0.45rem; flex-shrink: 0; }
    .exp-sym {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: color-mix(in srgb, var(--coin-color, #a78bfa) 55%, #666);
    }
    .exp-price-row { display: flex; align-items: baseline; gap: 0.5rem; margin-left: auto; }
    .exp-price { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1; }
    .exp-chg   { font-size: 0.82rem; font-weight: 600; }

    .exp-chart-area { flex: 1; min-height: 0; background: #000; }
    .exp-rsi-area   { height: 78px; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.04); }

    .exp-controls {
      display: flex; flex-direction: column; gap: 0;
      flex-shrink: 0;
      background: linear-gradient(0deg, #000 0%, transparent 100%);
    }
    .exp-tf-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.55rem 1rem 0.45rem;
    }
    .exp-zone-row {
      display: flex; gap: 0.5rem;
      padding: 0 1rem 0.6rem;
    }
    .exp-zone-wrap  { flex: 1; }
    .exp-zone-label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.6); white-space: nowrap; padding-right: 0.15rem; letter-spacing: 0.04em; }
    .exp-zone-input { font-size: 0.84rem; padding: 0.5rem 0.4rem; }

    .chart-expand-btn {
      font-size: 0.75rem; background: rgba(255,255,255,0.04);
      border: 1px solid #252525; border-radius: 6px;
      color: rgba(255,255,255,0.6); padding: 0.25rem 0.45rem;
      cursor: pointer; transition: all 0.15s; line-height: 1; flex-shrink: 0;
    }
    .chart-expand-btn:hover { color: #fff; border-color: #3a3a3a; background: rgba(255,255,255,0.07); }

    @media (orientation: landscape) and (max-height: 500px) {
      .exp-header    { padding: 0.3rem 1rem; }
      .exp-rsi-area  { height: 38px; }
      .exp-tf-row    { padding: 0.3rem 1rem; }
      .exp-zone-row  { display: none; }
    }

    /* ── Support / Resistance ── */
    .sr-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .sr-add-btn-hdr {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(255,255,255,0.04); border: 1px solid #252525; border-radius: 6px;
      color: rgba(255,255,255,0.6); padding: 0.28rem 0.65rem; cursor: pointer; transition: all 0.15s;
    }
    .sr-add-btn-hdr:hover { color: #fff; border-color: #3a3a3a; background: rgba(255,255,255,0.07); }
    .sr-add-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .sr-type-toggle {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      border-radius: 8px; padding: 0.55rem 0.7rem; cursor: pointer; border: 1px solid;
      transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .sr-type-toggle.support    { color: #4ade80; background: rgba(74,222,128,0.08);  border-color: rgba(74,222,128,0.25); }
    .sr-type-toggle.resistance { color: #f87171; background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25); }
    .sr-confirm-btn {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3);
      color: #a78bfa; border-radius: 8px; padding: 0.55rem 0.75rem; cursor: pointer;
      transition: all 0.15s; flex-shrink: 0;
    }
    .sr-confirm-btn:hover { background: rgba(167,139,250,0.22); border-color: rgba(167,139,250,0.5); }
    .sr-list  { display: flex; flex-direction: column; gap: 0.4rem; }
    .sr-empty { font-size: 0.78rem; color: rgba(255,255,255,0.6); padding: 0.1rem 0; }
    .sr-item  {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0.75rem; background: #0a0a0a; border-radius: 9px;
    }
    .sr-badge {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
    }
    .sr-badge.support    { color: #4ade80; background: rgba(74,222,128,0.1); }
    .sr-badge.resistance { color: #f87171; background: rgba(248,113,113,0.1); }
    .sr-item-price { font-size: 0.88rem; font-weight: 700; color: #e4e4e7; flex: 1; }
    .sr-del-btn {
      background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer;
      font-size: 0.9rem; padding: 0 0.1rem; transition: color 0.15s; line-height: 1; flex-shrink: 0;
    }
    .sr-del-btn:hover { color: rgba(255,255,255,0.9); }

    /* ── News ── */
    .news-list { display: flex; flex-direction: column; margin: 0 -1.5rem; }
    .news-item {
      display: block; text-decoration: none; color: inherit;
      padding: 0.9rem 1.5rem 0.9rem 1.25rem;
      border-bottom: 1px solid #161616;
      border-left: 2px solid #1a1a1a;
      cursor: pointer; transition: border-left-color 0.15s, background 0.12s;
    }
    .news-item:hover { background: rgba(255,255,255,0.025); border-left-color: #D9B65A; }
    .news-item:last-child { border-bottom: none; border-radius: 0 0 16px 16px; }
    .news-headline { font-size: 0.9rem; font-weight: 500; color: rgba(255,255,255,0.9); line-height: 1.55; margin-bottom: 0.45rem; }
    .news-meta { font-size: 0.68rem; color: rgba(255,255,255,0.6); display: flex; gap: 0.55rem; align-items: center; }
    .news-source {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); background: #1e1e1e; padding: 0.1rem 0.45rem; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .news-item:hover .news-source { color: #D9B65A; background: rgba(217,182,90,0.1); }

    /* ── Splash / loading screen ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }
    #splash.splash-hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    .splash-inner {
      display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash.splash-hidden .splash-inner { transform: scale(0.96); }
    .splash-brand {
      display: flex; align-items: center; justify-content: center;
      animation: splash-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both,
                 splash-breathe 3s 0.6s ease-in-out infinite;
    }
    .splash-loader {
      width: 80px; height: 1.5px;
      background: rgba(217,182,90,0.15);
      border-radius: 2px; overflow: hidden;
    }
    .splash-loader-bar {
      height: 100%; width: 0%;
      background: #D9B65A; border-radius: 2px;
      animation: splash-fill 1.6s 0.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes splash-enter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes splash-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.82; }
    }
    @keyframes splash-fill {
      0%   { width: 0%;   opacity: 1; }
      85%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    /* ── Standalone (Home Screen launch) overrides ── */
    @media (display-mode: standalone) {
      body           { overscroll-behavior-y: none; }
      .home-hero     { padding-top: max(2.75rem, calc(env(safe-area-inset-top) + 1.25rem)); }
      .home-header   { padding-top: max(2.25rem, calc(env(safe-area-inset-top) + 1.1rem)); }
      .detail-header { padding-top: max(1.1rem,  calc(env(safe-area-inset-top) + 0.85rem)); }
    }

    /* ══════════════════ AI ASSISTANT ══════════════════ */
    .ai-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 800; backdrop-filter: blur(2px);
    }
    .ai-backdrop.open { display: block; }

    /* Mobile: bottom sheet */
    .ai-panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: 68vh; max-height: 68vh;
      background: #0d0d0d; border-top: 1px solid #222;
      border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 850;
    }
    .ai-panel.open { transform: translateY(0); }

    /* Desktop: right side panel */
    @media (min-width: 640px) {
      .ai-panel {
        left: auto; right: 0; top: 0; bottom: 0;
        width: 340px; height: 100%; max-height: 100%;
        border-radius: 0; border-top: none; border-left: 1px solid #1e1e1e;
        transform: translateX(110%);
      }
      .ai-panel.open { transform: translateX(0); }
    }

    .ai-drag-handle {
      width: 36px; height: 4px; background: #2a2a2a; border-radius: 2px;
      margin: 10px auto 0; flex-shrink: 0;
    }
    @media (min-width: 640px) { .ai-drag-handle { display: none; } }

    .ai-panel-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1rem 0.75rem; border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .ai-panel-title {
      font-size: 0.82rem; font-weight: 700; color: #fff; flex: 1;
      letter-spacing: 0.03em; display: flex; align-items: center; gap: 0.4rem;
    }
    .ai-panel-mark { display: inline-flex; align-items: center; }
    .ai-panel-mark img { height: 48px; width: auto; mix-blend-mode: screen; display: block; }
    .ai-ctx-badge {
      font-size: 0.67rem; font-weight: 600; color: rgba(255,255,255,0.6);
      background: #161616; border: 1px solid #1e1e1e;
      border-radius: 6px; padding: 0.2rem 0.5rem; white-space: nowrap;
    }
    .ai-close-btn {
      background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1rem;
      cursor: pointer; padding: 0.2rem 0.35rem; border-radius: 6px;
      transition: color 0.15s;
    }
    .ai-close-btn:hover { color: #fff; }

    .ai-mode-row {
      display: flex; gap: 0; padding: 0.55rem 1rem;
      border-bottom: 1px solid #141414; flex-shrink: 0;
    }
    .ai-mode-btn {
      flex: 1; font-size: 0.68rem; font-weight: 600; padding: 0.3rem 0;
      background: #111; border: 1px solid #222; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .ai-mode-btn:first-child  { border-radius: 8px 0 0 8px; }
    .ai-mode-btn:last-child   { border-radius: 0 8px 8px 0; border-left: none; }
    .ai-mode-btn:not(:first-child):not(:last-child) { border-left: none; }
    .ai-mode-btn.active       { background: rgba(167,139,250,0.12); color: #a78bfa; border-color: #a78bfa; z-index: 1; }
    .ai-mode-btn:not(.active):hover { color: rgba(255,255,255,0.8); border-color: #333; }

    .ai-prompts {
      display: flex; gap: 0.4rem; padding: 0.65rem 1rem;
      overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
      border-bottom: 1px solid #141414;
    }
    .ai-prompts::-webkit-scrollbar { display: none; }
    .ai-prompt-chip {
      white-space: nowrap; font-size: 0.7rem; font-weight: 600;
      padding: 0.3rem 0.7rem; border-radius: 20px;
      border: 1px solid #2a2a2a; background: #111; color: rgba(255,255,255,0.7);

    .ai-prompt-chip:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }

    .ai-messages {

    .ai-msg-assistant { align-self: flex-start; align-items: flex-start; }

      font-size: 0.78rem; line-height: 1.55; padding: 0.55rem 0.8rem;
      border-radius: 14px; word-break: break-word;

    .ai-msg-user .ai-bubble {
      background: rgba(167,139,250,0.18); color: #e5e7eb;
      border-bottom-right-radius: 4px;
    }

    .ai-input-row {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem;

    .ai-input {

      background: #a78bfa; border: none; border-radius: 10px;

    .ai-open-btn {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;

    /* ── AI CTA Banner ── */

      display: flex; align-items: center; gap: 0.75rem;
      width: 100%; padding: 0.9rem 1.1rem;
      margin: 0.6rem 0 0.85rem;

    .ai-cta-pulse {

    /* ── Disclaimer modal ── */
    .disclaimer-overlay {

      cursor: pointer; transition: color 0.15s, border-color 0.15s;

    /* ── Hamburger button ── */
    .hamburger-btn {
      position: absolute; left: 0;

    /* ── Side menu overlay ── */
    .side-menu-overlay {

      background: rgba(0,0,0,0.62); backdrop-filter: blur(4px);
    }
    .side-menu-overlay.open { display: block; }

    /* ── Side menu drawer ── */

      position: fixed; top: 0; left: 0; bottom: 0; z-index: 1150;

      padding-top: env(safe-area-inset-top);

    .side-menu-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.25rem 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .side-menu-logo img { height: 36px; mix-blend-mode: screen; }
    .side-menu-close {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); font-size: 1.2rem; line-height: 1;
      padding: 0.25rem; border-radius: 6px; transition: color 0.15s;
    }
    .side-menu-close:hover { color: #fff; }

    .side-menu-nav { flex: 1; overflow-y: auto; padding: 0.5rem 0; }

    .side-menu-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1.25rem; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;

      -webkit-tap-highlight-color: transparent;

    .side-menu-item:hover  { background: rgba(255,255,255,0.04); color: #fff; }
    .side-menu-item:active { background: rgba(217,182,90,0.07); }

    .side-menu-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.12s, border-color 0.12s;
    }
    .side-menu-item:hover .side-menu-icon {
      background: rgba(217,182,90,0.09); border-color: rgba(217,182,90,0.22);
    }
    .side-menu-item-meta  { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .side-menu-item-label { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-menu-item-sub   { font-size: 0.68rem; color: rgba(255,255,255,0.38); margin-top: 0.1rem; }
    .side-menu-chevron    { font-size: 0.9rem; color: rgba(255,255,255,0.25); flex-shrink: 0; }

    .side-menu-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 0.35rem 1.25rem; }

    .side-menu-footer {
      padding: 1rem 1.25rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;

      font-size: 0.64rem; color: rgba(255,255,255,0.28); line-height: 1.6;
    }

    /* ── Bell button & unread badge ── */
    .home-header-row {
      display: flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 1.5rem;
    }
    .home-header-row .home-logo { margin-bottom: 0; }
    .bell-btn {
      position: absolute; right: 0;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: rgba(255,255,255,0.5); padding: 0.35rem;

      display: flex; align-items: center; gap: 0.15rem;

    .bell-count {
      font-size: 0.55rem; font-weight: 700;
      background: #a78bfa; color: #000;
      border-radius: 999px; padding: 0.08rem 0.32rem;

    .coin-alert-btn {
      font-size: 0.9rem; background: none; border: none;
      padding: 0.1rem 0.2rem; cursor: pointer; color: rgba(255,255,255,0.4);
      transition: color 0.2s; line-height: 1; flex-shrink: 0;
    }
    .coin-alert-btn:hover { color: rgba(255,255,255,0.8); }
    .coin-alert-btn.alerts-on { color: #a78bfa; }

    /* ── Alert Center panel ── */
    .ac-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 800; backdrop-filter: blur(2px);

    .ac-panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: 70vh; max-height: 70vh;
      background: #0d0d0d; border-top: 1px solid #222;
      border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);

    .ac-panel.open { transform: translateY(0); }

        left: auto; right: 0; top: 0; bottom: 0;

      padding: 0.55rem 1rem; border-bottom: 1px solid #141414;

    .ac-pref-label {
      font-size: 0.62rem; font-weight: 600; color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em; white-space: nowrap; margin-right: 0.1rem;

    .ac-pref-btn {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 0.25rem 0.55rem; border-radius: 20px;

      cursor: pointer; transition: all 0.15s; white-space: nowrap;

    .ac-pref-btn.active { border-color: rgba(167,139,250,0.5); background: rgba(167,139,250,0.12); color: #a78bfa; }

    .ac-list-wrap { flex: 1; overflow-y: auto; padding: 0.75rem 1rem; scrollbar-width: thin; scrollbar-color: #222 transparent; }
    .ac-list-hdr { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .ac-list-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); flex: 1; }
    .ac-list-count {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em;

      border-radius: 999px; padding: 0.08rem 0.45rem;

    .ac-clear-btn {
      font-size: 0.62rem; font-weight: 600; color: #52525b;
      background: none; border: none; cursor: pointer; padding: 0.1rem 0.3rem;
      transition: color 0.15s;

    .ac-clear-btn:hover { color: #a1a1aa; }
    .ac-section-lbl {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #3f3f46;
      padding: 0.55rem 0 0.3rem;
    }
    .ac-section-lbl + .ac-section-lbl { border-top: 1px solid #161616; margin-top: 0.4rem; }
    .ac-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .ac-empty { text-align: center; padding: 2.5rem 1rem; }

    .ac-empty-desc  { font-size: 0.72rem; color: #3a3a3a; line-height: 1.65; max-width: 220px; margin: 0 auto; }

<div id="app"></div>
<script>

  // ── Coin config ─────────────────────────────────────────────────────────────
  let COINS = [
    { id: 'ripple',           symbol: 'XRP',  name: 'XRP',       color: '#a78bfa', logo: 'https://coin-images.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png?1696501442',          krakenPair: 'XRPUSD',  priceDecimals: 4 },
    { id: 'bitcoin',          symbol: 'BTC',  name: 'Bitcoin',   color: '#f97316', logo: 'https://coin-images.coingecko.com/coins/images/1/small/bitcoin.png?1696501400',                         krakenPair: 'XBTUSD',  priceDecimals: 2 },

    { id: 'solana',           symbol: 'SOL',  name: 'Solana',    color: '#9945ff', logo: 'https://coin-images.coingecko.com/coins/images/4128/small/solana.png?1718769756',                       krakenPair: 'SOLUSD',  priceDecimals: 2 },

  // Global onerror handler — swaps a broken <img> for the colored dot fallback
  function _logoFallback(img, color) {
    const s = document.createElement('span');
    s.className = 'cdot';
    s.style.background = color;
    img.replaceWith(s);
  }

  // Renders coin.logo as an <img>; falls back to colored .cdot if logo is absent or broken
  function coinLogoHTML(coin, sizePx) {
    sizePx = sizePx || 18;
    if (!coin.logo) return '<span class="cdot" style="background:' + coin.color + '"></span>';
    return '<img class="clogo" src="' + coin.logo + '"' +
      ' alt="' + coin.symbol + '"' +
      ' width="' + sizePx + '" height="' + sizePx + '"' +
      ' onerror="console.error(\'[logo fail]\',this.src);_logoFallback(this,\'' + coin.color + '\')">';
  }

  function authFetch(path, opts = {}) {
    opts.headers = opts.headers || {};
    if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
    opts.headers['Content-Type'] = opts.headers['Content-Type'] || 'application/json';
    return fetch(path, opts);
  }

  async function saveUserData(key, value) {
    if (!authToken) return;
    try {
      await authFetch('/api/user/data/' + key, {
        method: 'PUT', body: JSON.stringify({ value }),
      });
    } catch(e) {}
  }

  async function syncLocalToServer() {
    // Load existing server data first
    let serverData = {};
    try {
      const r = await authFetch('/api/user/data');
      if (r.ok) serverData = await r.json();
    } catch(e) {}

    // Migrate favorites
    if (!serverData.favorites) {
      const local = JSON.parse(localStorage.getItem('fav-coins') || '[]');
      if (local.length) await saveUserData('favorites', local);
    } else {
      favorites = serverData.favorites;
    }

    // Migrate alertPrefs
    if (!serverData.alertPrefs) {
      const local = JSON.parse(localStorage.getItem('ctAlertPrefs') || '{}');
      if (Object.keys(local).length) await saveUserData('alertPrefs', local);
    } else {
      alertPrefsData = serverData.alertPrefs;
    }

    // Migrate zones
    if (!serverData.zones) {
      const zones = {};
      for (const coin of ASSET_REGISTRY) {
        const b = localStorage.getItem('zone-buy-'  + coin.id);
        const s = localStorage.getItem('zone-sell-' + coin.id);
        if (b || s) zones[coin.id] = { buy: b, sell: s };
      }
      if (Object.keys(zones).length) await saveUserData('zones', zones);
    }

    // Migrate srLines
    if (!serverData.srLines) {
      const srLines = {};
      for (const coin of ASSET_REGISTRY) {
        const raw = localStorage.getItem('sr-lines-' + coin.id);
        if (raw) try { srLines[coin.id] = JSON.parse(raw); } catch(e) {}
      }
      if (Object.keys(srLines).length) await saveUserData('srLines', srLines);
    }
  }

    if (ctx) ctx.textContent = contextMsg || '';

  async function submitSignup() {
    const email    = document.getElementById('signup-email')?.value.trim();
    const password = document.getElementById('signup-password')?.value;
    const confirm  = document.getElementById('signup-confirm')?.value;
    if (!email || !password) return setAuthError('Please fill in all fields.');
    if (password !== confirm) return setAuthError('Passwords do not match.');
    if (password.length < 8) return setAuthError('Password must be at least 8 characters.');
    const btn = document.getElementById('auth-submit-btn');
    if (btn) btn.disabled = true;
    clearAuthError();
    try {
      const r = await fetch('/api/auth/signup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await r.json();
      if (!r.ok) { setAuthError(data.error || 'Signup failed.'); return; }
      setAuthSession(data.token, data.user);
      await syncLocalToServer();
      closeAuthModal();
      renderHome();
      if (_authModalCallback) { const cb = _authModalCallback; _authModalCallback = null; cb(); }
    } catch(e) { setAuthError('Network error. Please try again.'); }
    finally { if (btn) btn.disabled = false; }
  }

  async function submitLogin() {
    const email    = document.getElementById('login-email')?.value.trim();
    const password = document.getElementById('login-password')?.value;
    if (!email || !password) return setAuthError('Please fill in all fields.');
    const btn = document.getElementById('auth-submit-btn');

    try {

        body: JSON.stringify({ email, password }),

      const data = await r.json();

      setAuthSession(data.token, data.user);
      await syncLocalToServer();
      closeAuthModal();

    } catch(e) { setAuthError('Network error. Please try again.'); }
    finally { if (btn) btn.disabled = false; }
  }

  function getCoin(id) { return ASSET_REGISTRY.find(c => c.id === id); }

  // Lazily adds a registry coin to the live price-tracking set on first open
  function ensureCoinActive(id) {
    if (!id || COINS.some(c => c.id === id)) return;
    const coin = ASSET_REGISTRY.find(c => c.id === id);
    if (!coin) return;
    COINS.push(coin);
    if (!priceHistory[id]) priceHistory[id] = [];
    if (!coinHistory[id])  coinHistory[id]  = [];
    if (zoneState[id]   === undefined) zoneState[id]   = 'neutral';
    if (signalState[id] === undefined) signalState[id] = null;

  function fmtPrice(price, coin) {
    if (price == null) return '—';
    const dec = coin ? coin.priceDecimals : 4;
    return price >= 1000
      ? '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '$' + price.toFixed(dec);
  }

  function calcPct(history) {
    if (history.length < 2) return null;
    const prev = history[history.length - 2];
    const cur  = history[history.length - 1];
    return ((cur - prev) / prev * 100).toFixed(2);
  }

  function pctClass(pct) {
    if (pct == null) return 'neutral-text';
    return parseFloat(pct) >= 0 ? 'up-text' : 'down-text';
  }

  function pctLabel(pct) {
    if (pct == null) return '—';
    const n = parseFloat(pct);
    return (n >= 0 ? '▲ +' : '▼ ') + Math.abs(n).toFixed(2) + '%';
  }

    if (appView === 'detail' && appCoin) {
      if (tvCharts[appCoin])    { tvCharts[appCoin].remove();    delete tvCharts[appCoin]; }
      if (tvRSICharts[appCoin]) { tvRSICharts[appCoin].remove(); delete tvRSICharts[appCoin]; }
      delete tvSeries[appCoin];
      delete tvRSISeries[appCoin];
      delete tvEMASeries[appCoin];
      delete tvVolSeries[appCoin];
      delete tvZoneLines[appCoin];
      delete srPriceLines[appCoin];
      delete srLastSide[appCoin];
    }
    if (view === 'detail' && coinId) ensureCoinActive(coinId);
    appView = view;
    appCoin = coinId || null;
    searchQuery = '';
    searchOpen  = false;
    if (!skipPush) {
      const hash = (view === 'detail' && coinId) ? '#/coin/' + coinId : '#/';
      if (location.hash !== hash) history.pushState(null, '', hash);
    }
    render();
  }

    const m = location.hash.match(/^#\/coin\/(.+)$/);

    else                     navigate('home',   null,  true);

      const coin = getCoin(id);

      const price = h.length ? fmtPrice(h[h.length - 1], coin) : '—';

  function buildMoversCards() {
    const ranked = COINS.map(coin => {
      const h   = priceHistory[coin.id];
      const pct = h.length >= 2
        ? parseFloat(((h[h.length-1] - h[h.length-2]) / h[h.length-2] * 100).toFixed(2))
        : null;
      return { coin, pct };
    }).filter(x => x.pct !== null)
      .sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct))
      .slice(0, 4);

    if (!ranked.length) return '';
    return ranked.map(({ coin, pct }) => {
      const h = priceHistory[coin.id];
      const price = fmtPrice(h[h.length - 1], coin);
      const up = pct >= 0;
      return '<div class="mover-card" onclick="navigate(\'detail\',\'' + coin.id + '\')">' +
        '<div class="mover-top">' +
          '<div class="mover-meta">' +
            '<div class="mover-sym">' + coinLogoHTML(coin, 20) + coin.symbol + '</div>' +
            '<div class="mover-name">' + coin.name + '</div>' +
          '</div>' +
          '<span class="mover-chg ' + (up ? 'up-pill' : 'down-pill') + '">' +
            (up ? '▲ +' : '▼ ') + Math.abs(pct).toFixed(2) + '%' +

        '</div>' +

      '</div>';
    }).join('');
  }

    const matches = ASSET_REGISTRY.filter(c =>
      c.symbol.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)

  function isNearZone(coinId, price) {
    if (!price) return null;
    const buy  = parseFloat(localStorage.getItem('zone-buy-'  + coinId));
    const sell = parseFloat(localStorage.getItem('zone-sell-' + coinId));
    const nearBuy  = !isNaN(buy)  && buy  > 0 && Math.abs(price - buy)  / buy  < 0.05;
    const nearSell = !isNaN(sell) && sell > 0 && Math.abs(price - sell) / sell < 0.05;
    if (nearBuy && nearSell) return 'both';
    if (nearBuy)  return 'buy';
    if (nearSell) return 'sell';
    return null;
  }

  function getSmartCoins() {
    const trending  = [];
    const nearZone  = [];
    const weakening = [];
    const breakout  = [];

    COINS.forEach(coin => {
      const id    = coin.id;
      const h     = priceHistory[id];
      const price = h.length ? h[h.length - 1] : null;
      const sig   = computeSignal(id);

      if (sig) {
        if (sig.cls === 'strong-up'   || sig.cls === 'weak-up')   trending.push({ coin, sig });
        if (sig.cls === 'strong-down' || sig.cls === 'weak-down') weakening.push({ coin, sig });
        if (sig.cls === 'sideways' && coinHistory[id].length >= 8) breakout.push({ coin, sig });
      }

      const zoneHit = isNearZone(id, price);
      if (zoneHit) nearZone.push({ coin, zoneHit, price });
    });

    return { trending, nearZone, weakening, breakout };
  }

  function buildSmartChip(coin, meta) {
    const h     = priceHistory[coin.id];
    const price = h.length ? fmtPrice(h[h.length - 1], coin) : '—';
    let labelHTML = '';

    if (meta.type === 'trend') {
      const up   = meta.sig.cls === 'strong-up' || meta.sig.cls === 'weak-up';
      const cls  = up ? 'up-text' : 'down-text';
      const icon = up ? '▲' : '▼';
      labelHTML  = '<div class="smart-chip-label ' + cls + '">' + icon + ' ' + meta.sig.label + '</div>';
    } else if (meta.type === 'zone') {
      if (meta.zoneHit === 'buy' || meta.zoneHit === 'both') {
        labelHTML = '<div class="smart-chip-label" style="color:#4ade80">⚠ Near Buy Zone</div>';
      } else {
        labelHTML = '<div class="smart-chip-label" style="color:#f87171">⚠ Near Sell Zone</div>';
      }
    } else if (meta.type === 'breakout') {
      labelHTML = '<div class="smart-chip-label neutral-text">→ Consolidating</div>';
    }

    return '<div class="smart-chip" style="--chip-color:' + coin.color + '33" onclick="navigate(\'detail\',\'' + coin.id + '\')">' +
      '<div class="smart-chip-sym">' + coinLogoHTML(coin, 14) + coin.symbol + '</div>' +
      labelHTML +
      '<div class="smart-chip-price">' + price + '</div>' +
    '</div>';
  }

    const { trending, nearZone, weakening, breakout } = getSmartCoins();
    let html = '';

    if (trending.length) {

    if (nearZone.length) {

  // ── Indicator math ───────────────────────────────────────────────────────────
  function calcEMA(candles, period) {
    if (candles.length < period) return [];
    const k = 2 / (period + 1);
    let ema = candles.slice(0, period).reduce((s, c) => s + c.close, 0) / period;
    const result = [{ time: candles[period - 1].time, value: ema }];
    for (let i = period; i < candles.length; i++) {
      ema = candles[i].close * k + ema * (1 - k);
      result.push({ time: candles[i].time, value: ema });
    }
    return result;
  }

  function calcRSI(candles, period) {
    period = period || 14;
    if (candles.length < period + 1) return [];
    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
      const d = candles[i].close - candles[i - 1].close;
      if (d > 0) avgGain += d; else avgLoss -= d;
    }
    avgGain /= period; avgLoss /= period;
    const rs0 = avgLoss === 0 ? 100 : avgGain / avgLoss;
    const result = [{ time: candles[period].time, value: parseFloat((100 - 100 / (1 + rs0)).toFixed(2)) }];
    for (let i = period + 1; i < candles.length; i++) {
      const d = candles[i].close - candles[i - 1].close;
      avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
      avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
      const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
      result.push({ time: candles[i].time, value: parseFloat((100 - 100 / (1 + rs)).toFixed(2)) });
    }
    return result;
  }

  async function fetchKrakenOHLC(coinId, interval) {
    const coin   = getCoin(coinId);
    const status = document.getElementById('tv-status-' + coinId);
    if (status) status.innerHTML = '<div class="chart-dots"><span></span><span></span><span></span></div>';
    try {
      const res  = await fetch('https://api.kraken.com/0/public/OHLC?pair=' + coin.krakenPair + '&interval=' + interval);
      const data = await res.json();
      if (data.error && data.error.length) throw new Error(data.error[0]);
      const key     = Object.keys(data.result).find(k => k !== 'last');
      const candles = data.result[key].map(d => ({
        time: d[0], open: parseFloat(d[1]), high: parseFloat(d[2]),
        low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[6]),
      })).slice(-(CANDLE_COUNTS[interval] || 720));
      // Cache per-interval for MTF summary
      if (!tvAllCandles[coinId]) tvAllCandles[coinId] = {};
      tvAllCandles[coinId][interval] = candles;
      tvLastCandles[coinId] = candles;
      if (tvSeries[coinId]) {
        applyChartData(coinId, candles);
        tvCharts[coinId].timeScale().fitContent();
        if (tvRSICharts[coinId]) tvRSICharts[coinId].timeScale().fitContent();
      }
      if (expandedCoin === coinId && tvExpandedSeries) {
        applyExpandedData(coinId, candles);
        tvExpandedChart.timeScale().fitContent();
        if (tvExpandedRSIChart) tvExpandedRSIChart.timeScale().fitContent();
        const es = document.getElementById('exp-status');
        if (es) es.innerHTML = '';
      }
      if (status) status.innerHTML = '';
      updateMTFRow(coinId);
    } catch(err) {
      if (status) status.innerHTML =
        '<div class="chart-err">⚠ Failed to load ' +
        '<button class="retry-btn" onclick="fetchKrakenOHLC(\'' + coinId + '\',' + interval + ')">Retry</button>' +
        '</div>';
    }
  }

  function switchTimeframe(btn, coinId, interval) {
    tvInterval[coinId] = interval;
    tvMarkers[coinId]  = [];
    document.querySelectorAll('.tf-btn[data-coin="' + coinId + '"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchKrakenOHLC(coinId, interval);
  }

  function addMarker(coinId, type, signal) {
    if (!tvLastCandles[coinId] || !tvLastCandles[coinId].length) return;
    const time = tvLastCandles[coinId][tvLastCandles[coinId].length - 1].time;
    let marker;
    if (type === 'buy') {
      marker = { time, position: 'belowBar', shape: 'arrowUp', color: '#4ade80', text: 'BUY', size: 1 };
    } else if (type === 'sell') {
      marker = { time, position: 'aboveBar', shape: 'arrowDown', color: '#f87171', text: 'SELL', size: 1 };
    } else if (type === 'signal') {
      const isUp = signal.cls.includes('up'), isDown = signal.cls.includes('down');
      if (!isUp && !isDown) return;
      const strong = signal.cls.includes('strong');
      marker = {
        time, position: isUp ? 'belowBar' : 'aboveBar', shape: 'circle',
        color: isUp ? (strong ? '#4ade80' : '#86efac') : (strong ? '#f87171' : '#fca5a5'),
        text: isUp ? (strong ? '▲▲' : '▲') : (strong ? '▼▼' : '▼'), size: 1,
      };
    }
    if (!marker) return;
    tvMarkers[coinId] = (tvMarkers[coinId] || []).filter(m => m.time !== time);
    tvMarkers[coinId].push(marker);
    tvMarkers[coinId].sort((a, b) => a.time - b.time);
    if (tvSeries[coinId]) tvSeries[coinId].setMarkers(tvMarkers[coinId]);
  }

  // ── Zone price lines ────────────────────────────────────────────────────────
  function updateZonePriceLines(coinId) {
    if (!tvSeries[coinId]) return;
    // Remove existing
    if (tvZoneLines[coinId]) {
      if (tvZoneLines[coinId].buy)  try { tvSeries[coinId].removePriceLine(tvZoneLines[coinId].buy);  } catch(e) {}
      if (tvZoneLines[coinId].sell) try { tvSeries[coinId].removePriceLine(tvZoneLines[coinId].sell); } catch(e) {}
    }
    tvZoneLines[coinId] = {};
    const buyEl  = document.getElementById('zone-buy-'  + coinId);
    const sellEl = document.getElementById('zone-sell-' + coinId);
    const buyP   = buyEl  ? parseFloat(buyEl.value)  : NaN;
    const sellP  = sellEl ? parseFloat(sellEl.value) : NaN;
    if (!isNaN(buyP)  && buyP  > 0) {
      tvZoneLines[coinId].buy  = tvSeries[coinId].createPriceLine({
        price: buyP,  color: 'rgba(74,222,128,0.7)',  lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Buy',
      });
    }
    if (!isNaN(sellP) && sellP > 0) {
      tvZoneLines[coinId].sell = tvSeries[coinId].createPriceLine({
        price: sellP, color: 'rgba(248,113,113,0.7)', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Sell',
      });
    }
  }

  // ── Multi-timeframe summary ──────────────────────────────────────────────────
  async function fetchMTFData(coinId) {
    const coin = getCoin(coinId);
    if (!tvAllCandles[coinId]) tvAllCandles[coinId] = {};
    updateMTFRow(coinId); // show current state immediately
    await Promise.all([1, 5, 1440].map(async iv => {
      if (tvAllCandles[coinId][iv]) return; // already cached
      try {
        const res  = await fetch('https://api.kraken.com/0/public/OHLC?pair=' + coin.krakenPair + '&interval=' + iv);
        const data = await res.json();
        if (data.error && data.error.length) return;
        const key = Object.keys(data.result).find(k => k !== 'last');
        tvAllCandles[coinId][iv] = data.result[key].map(d => ({
          time: d[0], open: parseFloat(d[1]), high: parseFloat(d[2]),
          low:  parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[6]),
        }));
        updateMTFRow(coinId); // update as each arrives
        if (iv === 5) { updateTrend(coinId); checkTrendFlip(coinId); checkRSIAlert(coinId); } // refresh EMA trend + alerts
        // When BTC 5m loads, refresh correlation chip on whatever coin is open
        if (iv === 5 && coinId === 'bitcoin' && expandedCoin && expandedCoin !== 'bitcoin') {
          updateInsight(expandedCoin);
        }
      } catch(e) {}
    }));
  }

  function computeTrend(candles) {
    if (!candles || candles.length < 52) return null;
    const e20 = calcEMA(candles, 20); const e50 = calcEMA(candles, 50);
    if (!e20.length || !e50.length) return null;
    const pct  = (e20[e20.length-1].value - e50[e50.length-1].value) / e50[e50.length-1].value * 100;
    const conf = Math.min(95, Math.round(30 + Math.abs(pct) * 40));
    if (pct >  1.2)  return { label: 'Strong Uptrend',  cls: 'up',      icon: '▲▲', confidence: conf };
    if (pct >  0.15) return { label: 'Uptrend',          cls: 'up',      icon: '▲',  confidence: conf };
    if (pct < -1.2)  return { label: 'Strong Downtrend', cls: 'down',    icon: '▼▼', confidence: conf };
    if (pct < -0.15) return { label: 'Downtrend',        cls: 'down',    icon: '▼',  confidence: conf };
    return { label: 'Sideways', cls: 'neutral', icon: '—', confidence: conf };
  }

  function computeMomentum(candles) {
    if (!candles || candles.length < 60) return null;
    const e20 = calcEMA(candles, 20); const e50 = calcEMA(candles, 50);
    if (e20.length < 8 || e50.length < 8) return null;
    const spreadNow  = Math.abs(e20[e20.length-1].value - e50[e50.length-1].value);
    const spreadPrev = Math.abs(e20[e20.length-6].value - e50[e50.length-6].value);
    const price      = candles[candles.length-1].close;
    const deltaPct   = ((spreadNow - spreadPrev) / price) * 100;
    if (deltaPct >  0.04) return { label: 'Accelerating', cls: 'up' };
    if (deltaPct < -0.04) return { label: 'Slowing',      cls: 'warn' };
    return { label: 'Steady', cls: 'neutral' };
  }

  function updateMTFRow(coinId) {
    const row = document.getElementById('mtf-row-' + coinId);
    if (!row) return;
    const items = [
      { iv: 1,    tfLabel: 'Short-term', tf: '1m' },
      { iv: 5,    tfLabel: 'Mid-term',   tf: '5m' },
      { iv: 1440, tfLabel: 'Long-term',  tf: '1D' },
    ];
    row.innerHTML = items.map(({ iv, tfLabel, tf }) => {
      const candles = tvAllCandles[coinId] && tvAllCandles[coinId][iv];
      const trend   = candles ? computeTrend(candles) : null;
      const cls     = trend ? (trend.cls === 'up' ? 'up-text' : trend.cls === 'down' ? 'down-text' : 'neutral-text') : 'neutral-text';
      const label   = trend ? trend.label : '…';
      const conf    = trend ? '<div class="mtf-conf">' + trend.confidence + '%</div>' : '';
      return '<div class="mtf-item">' +
        '<div class="mtf-tf">' + tfLabel + ' <span>(' + tf + ')</span></div>' +
        '<div class="mtf-val ' + cls + '">' + label + '</div>' +
        conf +
      '</div>';
    }).join('');
    updateInsight(coinId);
  }

  function updateExpandedMTFSummary(coinId) {
    if (expandedCoin !== coinId) return;
    const el = document.getElementById('exp-mtf-summary');
    if (!el) return;
    const items = [
      { iv: 1,    tf: '1m' },
      { iv: 5,    tf: '5m' },
      { iv: 1440, tf: '1D' },
    ];
    el.innerHTML = items.map(({ iv, tf }, i) => {
      const candles = tvAllCandles[coinId] && tvAllCandles[coinId][iv];
      const trend   = candles ? computeTrend(candles) : null;
      const cls     = trend ? (trend.cls === 'up' ? 'up-text' : trend.cls === 'down' ? 'down-text' : 'neutral-text') : 'neutral-text';
      const label   = trend ? trend.label : '…';
      const conf = trend ? ' <span style="color:#2a2a2a;font-size:0.6rem;font-weight:600">' + trend.confidence + '%</span>' : '';
      return (i > 0 ? '<span class="exp-mtf-dot">·</span>' : '') +
        '<span class="exp-mtf-item">' +
          '<span class="exp-mtf-tf">' + tf + '</span>' +
          '<span class="exp-mtf-val ' + cls + '">' + label + conf + '</span>' +
        '</span>';
    }).join('');
    updateExpandedInsight(coinId);
  }
